# ===============================
# 프로덕션 환경 설정 (prod 프로파일)
# ===============================
# 이 파일은 application.properties를 상속받으며, 프로덕션 환경에 특화된 설정을 포함합니다.
# 주의: 프로덕션 환경에서는 반드시 환경 변수로 설정값을 제공해야 합니다.

# ===============================
# Database 설정 (프로덕션용)
# ===============================
# 프로덕션에서는 환경 변수로 반드시 설정해야 함
# SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
# Oracle Database 드라이버 및 다이얼렉트 명시
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
# Hibernate Dialect 설정 (DB 연결 전에도 필요)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect

# Oracle JDBC TLS/SSL 연결 설정은 deployment-prod.yaml의 JAVA_TOOL_OPTIONS 환경 변수로 설정됨
# -Doracle.net.ssl_server_dn_match=true -Doracle.net.ssl_version=1.2

# ===============================
# Kafka 설정 (프로덕션용)
# ===============================
# 프로덕션에서는 환경 변수로 반드시 설정해야 함
# SPRING_KAFKA_BOOTSTRAP_SERVERS

# ===============================
# Flyway 설정 (DB 마이그레이션)
# ===============================
# Oracle용 마이그레이션 파일 경로
spring.flyway.locations=classpath:db/migration/oracle

# ===============================
# JPA/Hibernate 설정 (프로덕션용)
# ===============================
# Flyway 사용 시 ddl-auto는 validate 권장 (스키마 검증만, 변경 없음)
spring.jpa.hibernate.ddl-auto=validate
# spring.jpa.hibernate.ddl-auto=create  # 프로덕션에서는 절대 사용 금지 (데이터 손실)
# 개발 중 SQL 확인용
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ===============================
# 로깅 설정 (프로덕션용)
# ===============================
# 프로덕션에서는 INFO 레벨로 제한
logging.level.root=INFO
logging.level.me.unbrdn.core=INFO

