# ===============================
# 공통 설정 (모든 프로파일에서 공통으로 사용)
# ===============================
spring.application.name=core
server.port=${SERVER_PORT:8081}

# ===============================
# Kafka 설정
# ===============================
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${SPRING_KAFKA_CONSUMER_GROUP_ID:core-group}
spring.kafka.consumer.auto-offset-reset=${SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET:earliest}

# Kafka Serializer/Deserializer 설정
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
kafka.interview-result-topic=${KAFKA_INTERVIEW_RESULT_TOPIC:interview-result}
kafka.interview-result-group-id=${KAFKA_INTERVIEW_RESULT_GROUP_ID:core-interview-result-group}
kafka.document-process-topic=${KAFKA_DOCUMENT_PROCESS_TOPIC:document.process}
kafka.document-processed-topic=${KAFKA_DOCUMENT_PROCESSED_TOPIC:document.processed}
kafka.interview-messages-topic=${KAFKA_INTERVIEW_MESSAGES_TOPIC:interview.messages}
kafka.storage-completed-topic=${KAFKA_STORAGE_COMPLETED_TOPIC:storage.completed}

# ===============================
# gRPC Server 설정
# ===============================
grpc.server.port=${GRPC_SERVER_PORT:9090}
grpc.server.permit-keep-alive-without-calls=true
grpc.server.permit-keep-alive-time=10s

# ===============================
# gRPC Client 설정
# ===============================
grpc.client.llm-service.address=static://${LLM_GRPC_HOST:llm}:${LLM_GRPC_PORT:50051}
grpc.client.llm-service.negotiation-type=plaintext
grpc.client.llm-service.enable-keep-alive=true
grpc.client.llm-service.keep-alive-time=30s
grpc.client.llm-service.keep-alive-timeout=20s
grpc.client.llm-service.keep-alive-without-calls=true
grpc.client.user-service.address=static://${USER_GRPC_HOST:localhost}:${USER_GRPC_PORT:9090}
grpc.client.user-service.negotiation-type=plaintext
grpc.client.user-service.enable-keep-alive=true
grpc.client.user-service.keep-alive-time=30s
grpc.client.user-service.keep-alive-timeout=5s
grpc.client.storage-service.address=static://${STORAGE_GRPC_HOST:storage}:${STORAGE_GRPC_PORT:8000}
grpc.client.storage-service.negotiation-type=plaintext
grpc.client.storage-service.enable-keep-alive=true
grpc.client.storage-service.keep-alive-time=30s
grpc.client.storage-service.keep-alive-timeout=20s
grpc.client.storage-service.keep-alive-without-calls=true
grpc.client.document-service.address=static://${DOCUMENT_GRPC_HOST:document}:${DOCUMENT_GRPC_PORT:50053}
grpc.client.document-service.negotiation-type=plaintext
grpc.client.document-service.enable-keep-alive=true
grpc.client.document-service.keep-alive-time=30s
grpc.client.document-service.keep-alive-timeout=20s
grpc.client.document-service.keep-alive-without-calls=true

# ===============================
# Flyway 설정 (DB 마이그레이션 - 공통)
# ===============================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration/${DATABASE_TYPE:postgresql}

# ===============================
# Redis Track 1 설정 (AKS 내부 - 실시간 파이프라인)
# 역할: UX 동기화, STT/TTS Pub/Sub, LLM 버퍼
# ===============================
spring.data.redis.sentinel.master=${REDIS_SENTINEL_MASTER:mymaster}
spring.data.redis.sentinel.nodes=${REDIS_SENTINEL_NODES:redis-track1-headless:26379}
spring.data.redis.database=${REDIS_DB:0}
spring.data.redis.password=${REDIS_PASSWORD:}

# Redis Pub/Sub 채널 정의 (Track 1 명세 준수 - 통합 표준 적용)
redis.channel.llm-pubsub-prefix=${REDIS_CHANNEL_LLM_PREFIX:interview:transcript:pubsub:}
redis.channel.stt-pubsub-prefix=${REDIS_CHANNEL_STT_PREFIX:interview:transcript:pubsub:}

# Redis Streams 설정 (Track 1)
redis.stream.stt-transcript=${REDIS_STREAM_STT_TRANSCRIPT:interview:transcript:process}
redis.stream.stt-transcript-group=${REDIS_STREAM_STT_GROUP:interview:transcript:cg:stt}

# ===============================
# Redis Track 3 설정 (Azure Cache for Redis - 안전 금고)
# 역할: 면접 세션 상태 관리, TTS 작업 큐
# ===============================
redis.track3.host=${REDIS_TRACK3_HOST:localhost}
redis.track3.port=${REDIS_TRACK3_PORT:6379}
redis.track3.password=${REDIS_TRACK3_PASSWORD:}
redis.track3.ssl=${REDIS_TRACK3_SSL:false}
redis.track3.database=${REDIS_TRACK3_DB:0}

# Redis Queue/Stream 설정 (Track 3)
redis.stream.sentence-stream=interview:sentence:stream
redis.queue.tts-sentence=interview:sentence:queue:tts

# ===============================
# JWT 설정 (RS256)
# ===============================
jwt.access-token-expiration-seconds=${JWT_ACCESS_TOKEN_EXP_SECONDS:1800}
jwt.refresh-token-expiration-seconds=${JWT_REFRESH_TOKEN_EXP_SECONDS:2592000}
jwt.keys[0].kid=${JWT_KEY_0_KID:}
jwt.keys[0].private-key=${JWT_KEY_0_PRIVATE_KEY:}
jwt.keys[0].public-key=${JWT_KEY_0_PUBLIC_KEY:}
jwt.keys[0].active=${JWT_KEY_0_ACTIVE:true}
jwt.keys[1].kid=${JWT_KEY_1_KID:}
jwt.keys[1].private-key=${JWT_KEY_1_PRIVATE_KEY:}
jwt.keys[1].public-key=${JWT_KEY_1_PUBLIC_KEY:}
jwt.keys[1].active=${JWT_KEY_1_ACTIVE:false}

# ===============================
# Database 설정 (Oracle Database)
# ===============================
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:false}

# ===============================
# Actuator 설정 (Health Check)
# ===============================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized
management.health.db.enabled=true

# ===============================
# 로깅 설정
# ===============================
logging.level.root=${LOG_LEVEL:INFO}
logging.level.me.unbrdn.core=${LOG_LEVEL_CORE:INFO}
logging.level.org.springframework=INFO
logging.level.org.hibernate=INFO
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF
logging.level.org.hibernate.stat=OFF
logging.level.org.hibernate.tool.hbm2ddl=INFO
logging.level.org.hibernate.cache=INFO
