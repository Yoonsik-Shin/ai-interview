# ===============================
# 로컬 개발 환경 설정 (local 프로파일)
# ===============================
# 이 파일은 application.properties를 상속받으며, 로컬 개발 환경에 특화된 설정을 포함합니다.

# ===============================
# Database 설정 (로컬 개발용)
# ===============================
# 환경변수가 없을 때만 localhost 사용 (환경변수 우선)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/interview_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}

# ===============================
# Kafka 설정 (로컬 개발용)
# ===============================
# 환경변수가 없을 때만 localhost 사용 (환경변수 우선)
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# ===============================
# JPA/Hibernate 설정 (로컬 개발용)
# ===============================
# 로컬 개발 시에는 SQL 로깅 활성화 권장
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# 로깅 설정 (로컬 개발용)
# ===============================
# 로컬 개발 시에는 더 자세한 로깅
logging.level.root=INFO
logging.level.com.example.core_java=DEBUG
logging.level.org.springframework.kafka=DEBUG