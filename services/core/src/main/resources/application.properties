# ===============================
# 공통 설정 (모든 프로파일에서 공통으로 사용)
# ===============================
spring.application.name=core
server.port=${SERVER_PORT:8081}

# ===============================
# Kafka 설정
# ===============================
# 환경 변수로 오버라이드 가능: SPRING_KAFKA_BOOTSTRAP_SERVERS
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${SPRING_KAFKA_CONSUMER_GROUP_ID:core-group}
spring.kafka.consumer.auto-offset-reset=${SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET:earliest}

# Kafka Serializer/Deserializer 설정
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
kafka.interview-result-topic=${KAFKA_INTERVIEW_RESULT_TOPIC:interview-result}
kafka.interview-result-group-id=${KAFKA_INTERVIEW_RESULT_GROUP_ID:core-interview-result-group}

# ===============================
# gRPC Client 설정 (LLM Service)
# ===============================
grpc.client.llm-service.address=${LLM_GRPC_URL:static://llm:50051}
grpc.client.llm-service.negotiation-type=plaintext
grpc.client.llm-service.enable-keep-alive=true
grpc.client.llm-service.keep-alive-time=10s
grpc.client.llm-service.keep-alive-timeout=5s
grpc.client.llm-service.keep-alive-without-calls=true
grpc.client.user-service.address=${USER_GRPC_URL:static://localhost:9090}
grpc.client.user-service.negotiation-type=plaintext
grpc.client.user-service.enable-keep-alive=true
grpc.client.user-service.keep-alive-time=30s
grpc.client.user-service.keep-alive-timeout=5s

# ===============================
# Flyway 설정 (DB 마이그레이션 - 공통)
# ===============================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
# locations는 프로파일별로 설정 (postgresql/oracle 분리)

# ===============================
# Redis 설정 (Sentinel 모드 - 공통)
# ===============================
# 로컬/프로덕션 모두 Sentinel 모드 사용
# 로컬 기본값: mymaster, redis-headless:26379
# 프로덕션: 환경 변수로 주입
spring.data.redis.sentinel.master=${REDIS_SENTINEL_MASTER:mymaster}
spring.data.redis.sentinel.nodes=${REDIS_SENTINEL_NODES:redis-headless:26379}
spring.data.redis.database=${REDIS_DB:2}
# Standalone 설정 제거 (Sentinel 모드 우선)

# Redis Streams 설정
redis.stream.stt-transcript=${REDIS_STREAM_STT_TRANSCRIPT:stt:transcript:stream}
redis.stream.stt-transcript-group=${REDIS_STREAM_STT_GROUP:core-stt-consumer-group}
redis.stream.stt-transcript-consumer=${REDIS_STREAM_STT_CONSUMER:core-consumer-1}

# Redis Pub/Sub 설정
redis.channel.transcript-prefix=${REDIS_CHANNEL_TRANSCRIPT_PREFIX:interview:transcript:}

# Redis Queue 설정
redis.queue.tts-sentence=${REDIS_QUEUE_TTS_SENTENCE:tts:sentence:queue}


# ===============================
# JWT 설정 (RS256)
# ===============================
jwt.access-token-expiration-seconds=${JWT_ACCESS_TOKEN_EXP_SECONDS:1800}
jwt.refresh-token-expiration-seconds=${JWT_REFRESH_TOKEN_EXP_SECONDS:2592000}
jwt.keys[0].kid=${JWT_KEY_0_KID:}
jwt.keys[0].private-key=${JWT_KEY_0_PRIVATE_KEY:}
jwt.keys[0].public-key=${JWT_KEY_0_PUBLIC_KEY:}
jwt.keys[0].active=${JWT_KEY_0_ACTIVE:true}
jwt.keys[1].kid=${JWT_KEY_1_KID:}
jwt.keys[1].private-key=${JWT_KEY_1_PRIVATE_KEY:}
jwt.keys[1].public-key=${JWT_KEY_1_PUBLIC_KEY:}
jwt.keys[1].active=${JWT_KEY_1_ACTIVE:false}

# ===============================
# Database 설정 (Oracle Database)
# ===============================
# 환경 변수로 오버라이드 가능: SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
# Oracle DB URL 형식: jdbc:oracle:thin:@<host>:<port>/<service_name>
# 예시: jdbc:oracle:thin:@adb.ap-chuncheon-1.oraclecloud.com:1522/abc123xyz_interview_db_high.adb.oraclecloud.com
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
# 드라이버는 프로파일별로 설정 (application-local.properties 또는 application-prod.properties)
# spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# JPA/Hibernate 설정
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
# 다이얼렉트는 프로파일별로 설정 (application-local.properties 또는 application-prod.properties)
# 기본값은 주석 처리 (프로파일별로 명시적으로 설정)
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:false}

# ===============================
# Actuator 설정 (Health Check)
# ===============================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized
management.health.db.enabled=true

# ===============================
# 로깅 설정
# ===============================
logging.level.root=${LOG_LEVEL:INFO}
logging.level.me.unbrdn.core=${LOG_LEVEL_CORE:DEBUG}
