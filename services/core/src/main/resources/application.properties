# ===============================
# 공통 설정 (모든 프로파일에서 공통으로 사용)
# ===============================
spring.application.name=core
server.port=${SERVER_PORT:8081}

# ===============================
# Kafka 설정
# ===============================
# 환경 변수로 오버라이드 가능: SPRING_KAFKA_BOOTSTRAP_SERVERS
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${SPRING_KAFKA_CONSUMER_GROUP_ID:core-group}
spring.kafka.consumer.auto-offset-reset=${SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET:earliest}

# Kafka Serializer/Deserializer 설정
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# ===============================
# Database 설정 (Oracle Database)
# ===============================
# 환경 변수로 오버라이드 가능: SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
# Oracle DB URL 형식: jdbc:oracle:thin:@<host>:<port>/<service_name>
# 예시: jdbc:oracle:thin:@adb.ap-chuncheon-1.oraclecloud.com:1522/abc123xyz_interview_db_high.adb.oraclecloud.com
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
# 드라이버는 프로파일별로 설정 (application-local.properties 또는 application-prod.properties)
# spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# JPA/Hibernate 설정
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
# 다이얼렉트는 프로파일별로 설정 (application-local.properties 또는 application-prod.properties)
# 기본값은 주석 처리 (프로파일별로 명시적으로 설정)
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:false}

# ===============================
# Actuator 설정 (Health Check)
# ===============================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized
management.health.db.enabled=true

# ===============================
# 로깅 설정
# ===============================
logging.level.root=${LOG_LEVEL:INFO}
logging.level.me.unbrdn.core=${LOG_LEVEL_CORE:DEBUG}