# ===============================
# 로컬 개발 환경 설정 (local 프로파일)
# ===============================
# 이 파일은 application.properties를 상속받으며, 로컬 개발 환경에 특화된 설정을 포함합니다.

# ===============================
# Database 설정 (로컬 개발용 - PostgreSQL)
# ===============================
# 환경변수가 없을 때만 로컬 PostgreSQL 사용 (환경변수 우선)
# 로컬에서 PostgreSQL Container 사용 (시작 시간: 5-10초)
# 프로덕션 환경에서는 Oracle Autonomous Database 사용
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/interview_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# Kafka 설정 (로컬 개발용 - Strimzi Kafka)
# ===============================
# 환경변수가 없을 때만 Strimzi Kafka 사용 (환경변수 우선)
# Strimzi Operator로 배포된 Kafka 클러스터 사용
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka-cluster-kafka-bootstrap.kafka:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# ===============================
# Flyway 설정 (DB 마이그레이션)
# ===============================
# PostgreSQL용 마이그레이션 파일 경로
spring.flyway.locations=classpath:db/migration/postgresql

# ===============================
# JPA/Hibernate 설정 (로컬 개발용)
# ===============================
# 로컬 개발 시에는 SQL 로깅 활성화 권장
spring.jpa.show-sql=true
# Flyway 사용 시 ddl-auto는 validate 권장 (스키마 검증만, 변경 없음)
# none: 아무것도 안함, validate: 검증만, update: 변경 적용 (위험), create: 재생성 (데이터 손실)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# 로깅 설정 (로컬 개발용)
# ===============================
# 로컬 개발 시에는 더 자세한 로깅
logging.level.root=INFO
logging.level.me.unbrdn.core=DEBUG
logging.level.org.springframework.kafka=INFO
logging.level.org.flywaydb=DEBUG

# ===============================
# Spring AI Vector Store 설정
# ===============================
# PgVector Store 설정 (로컬 개발용)
spring.ai.vectorstore.pgvector.dimensions=384
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.remove-existing-vector-store-table=false