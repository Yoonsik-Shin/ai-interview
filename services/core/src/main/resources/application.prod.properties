# ===============================
# 프로덕션 환경 설정 (prod 프로파일)
# ===============================
# 이 파일은 application.properties를 상속받으며, 프로덕션 환경에 특화된 설정을 포함합니다.
# 주의: 프로덕션 환경에서는 반드시 환경 변수로 설정값을 제공해야 합니다.

# ===============================
# Database 설정 (프로덕션용)
# ===============================
# 프로덕션에서는 환경 변수로 반드시 설정해야 함
# SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD

# ===============================
# Kafka 설정 (프로덕션용)
# ===============================
# 프로덕션에서는 환경 변수로 반드시 설정해야 함
# SPRING_KAFKA_BOOTSTRAP_SERVERS

# ===============================
# JPA/Hibernate 설정 (프로덕션용)
# ===============================
# 프로덕션에서는 스키마 자동 생성 비활성화
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ===============================
# 로깅 설정 (프로덕션용)
# ===============================
# 프로덕션에서는 INFO 레벨로 제한
logging.level.root=INFO
logging.level.me.unbrdn.core=INFO

