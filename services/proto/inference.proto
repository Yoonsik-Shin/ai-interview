syntax = "proto3";

package inference;

service InferenceService {
  // TTS (Text-to-Speech) 서비스
  rpc TextToSpeech(TTSRequest) returns (stream TTSChunk);
}

message TTSRequest {
  string text = 1;
  string mode = 2;      // "practice" or "real"
  string persona = 3;   // "PRESSURE", "COMFORTABLE", "RANDOM"
  double speed = 4;     // 재생 속도 (기본 1.0)
}

message TTSChunk {
  bytes audio_data = 1;  // MP3 오디오 청크
  bool is_final = 2;     // 마지막 청크 여부
}
