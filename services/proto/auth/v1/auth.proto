syntax = "proto3";

package auth.v1;

option java_multiple_files = true;
option java_package = "me.unbrdn.core.grpc.auth.v1";
option java_outer_classname = "AuthProto";

service AuthService {
  rpc RegisterCandidate (RegisterCandidateRequest) returns (RegisterResponse);
  rpc RegisterRecruiter (RegisterRecruiterRequest) returns (RegisterResponse);
  rpc AuthenticateUser (AuthenticateUserRequest) returns (AuthenticateUserResponse);
  rpc RefreshToken (RefreshTokenRequest) returns (RefreshTokenResponse);
  rpc LoginWithOAuth (LoginWithOAuthRequest) returns (LoginWithOAuthResponse);
  rpc CompleteOAuthProfile (CompleteOAuthProfileRequest) returns (AuthenticateUserResponse);
}

message RegisterCandidateRequest {
  string email = 1;
  string password = 2;
  string nickname = 3;
  string phone_number = 4;
}

message RegisterRecruiterRequest {
  string email = 1;
  string password = 2;
  string nickname = 3;
  string phone_number = 4;
  string company_code = 5;
}

message RegisterResponse {
  string user_id = 1;
}

message AuthenticateUserRequest {
  string email = 1;
  string password = 2;
}

message AuthenticateUserResponse {
  string access_token = 1;
  string refresh_token = 2;
  User user = 3;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message RefreshTokenResponse {
  string access_token = 1;
  string refresh_token = 2;
}

message User {
  string id = 1;
  string email = 2;
  string nickname = 3;
  string role = 4;
  string phone_number = 5;
  string company_code = 6;
}

message LoginWithOAuthRequest {
  string provider = 1;
  string provider_user_id = 2;
  string access_token = 3;
  int64 token_expires_at = 4;
  string email = 5;
  string name = 6;
  string picture_url = 7;
}

message LoginWithOAuthResponse {
  bool is_new_user = 1;
  string pending_token = 2;
  AuthenticateUserResponse auth = 3;
}

message CompleteOAuthProfileRequest {
  string pending_token = 1;
  string role = 2;
  string phone_number = 3;
  string nickname = 4;
  string password = 5;
}
