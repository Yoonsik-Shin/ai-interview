syntax = "proto3";

package auth.v1;

option java_multiple_files = true;
option java_package = "me.unbrdn.core.grpc.auth.v1";
option java_outer_classname = "AuthProto";

service AuthService {
  rpc RegisterCandidate (RegisterCandidateRequest) returns (RegisterResponse);
  rpc RegisterRecruiter (RegisterRecruiterRequest) returns (RegisterResponse);
  rpc AuthenticateUser (AuthenticateUserRequest) returns (AuthenticateUserResponse);
  rpc RefreshToken (RefreshTokenRequest) returns (RefreshTokenResponse);
}

message RegisterCandidateRequest {
  string email = 1;
  string password = 2;
  string nickname = 3;
  string phone_number = 4;
}

message RegisterRecruiterRequest {
  string email = 1;
  string password = 2;
  string nickname = 3;
  string phone_number = 4;
  string company_code = 5;
}

message RegisterResponse {
  string user_id = 1;
}

message AuthenticateUserRequest {
  string email = 1;
  string password = 2;
}

message AuthenticateUserResponse {
  string access_token = 1;
  string refresh_token = 2;
  User user = 3;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message RefreshTokenResponse {
  string access_token = 1;
  string refresh_token = 2;
}

message User {
  string id = 1;
  string email = 2;
  string nickname = 3;
  string role = 4;
  string phone_number = 5;
  string company_code = 6;
}
