syntax = "proto3";

package interview;

option java_package = "me.unbrdn.core.grpc";
option java_outer_classname = "InterviewProto";

// === 서비스 정의 (인터페이스) ===
service InterviewServiceGrpc {
  // 면접 세션 생성 요청을 받아서 응답을 반환한다.
  rpc CreateInterview (CreateInterviewRequest) returns (CreateInterviewResponse);
  
  // Stage 관리
  rpc GetInterviewStage (GetInterviewStageRequest) returns (GetInterviewStageResponse);
  rpc TransitionStage (TransitionStageRequest) returns (TransitionStageResponse);
}

// === Enum 정의 ===
enum InterviewTypeProto {
  INTERVIEW_TYPE_UNSPECIFIED = 0;
  REAL = 1;
  PRACTICE = 2;
}

enum InterviewPersonaProto {
  INTERVIEW_PERSONA_UNSPECIFIED = 0;
  PRESSURE = 1;
  COMFORTABLE = 2;
  RANDOM = 3;
}

enum InterviewStatusProto {
  INTERVIEW_STATUS_UNSPECIFIED = 0;
  READY = 1;
  IN_PROGRESS = 2;
  COMPLETED = 3;
  CANCELLED = 4;
}

enum InterviewStageProto {
  INTERVIEW_STAGE_UNSPECIFIED = 0;
  WAITING = 1;
  GREETING_PROMPT = 2;
  GREETING = 3;
  INTERVIEWER_INTRO = 4;
  SELF_INTRO = 5;
  IN_PROGRESS_STAGE = 6;  // IN_PROGRESS와 구분하기 위해 _STAGE 접미사
  COMPLETED_STAGE = 7;
}

// === 메시지 정의 (DTO) ===
message CreateInterviewRequest {
  string user_id = 1; // UUID
  optional string resume_id = 2; // UUID (optional - 이력서 없이도 면접 가능)
  string domain = 3;
  InterviewTypeProto type = 4;
  InterviewPersonaProto persona = 5;
  int32 interviewer_count = 6;
  int32 target_duration_minutes = 7;
  string self_introduction = 8;
}

message CreateInterviewResponse {
  string interview_id = 1; // UUID
  InterviewStatusProto status = 2;
}

// Stage 조회
message GetInterviewStageRequest {
  string interview_session_id = 1;
}

message GetInterviewStageResponse {
  InterviewStageProto stage = 1;
  int64 self_intro_elapsed_seconds = 2;
  optional string persona = 3;
  optional int32 interviewer_count = 4;
  optional string domain = 5;
}

// Stage 전환
message TransitionStageRequest {
  string interview_session_id = 1;
  InterviewStageProto new_stage = 2;
}

message TransitionStageResponse {
  InterviewStageProto current_stage = 1;
}
