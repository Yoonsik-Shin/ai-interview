syntax = "proto3";

package llm.v1;

import "common/v1/enums.proto";

option java_multiple_files = true;
option java_package = "me.unbrdn.core.grpc.llm.v1";
option java_outer_classname = "LlmProto";

service LlmService {
  rpc GenerateResponse(GenerateRequest) returns (stream TokenChunk);
  rpc TextToSpeech(TTSRequest) returns (stream TTSChunk);
  rpc GetEmbedding(GetEmbeddingRequest) returns (GetEmbeddingResponse);

  // 이력서 분류 및 판별
  rpc ClassifyResume(ClassifyResumeRequest) returns (ClassifyResumeResponse);
}

message ClassifyResumeRequest {
  string text = 1;
}

message ClassifyResumeResponse {
  bool is_resume = 1;
  string reason = 2;
  float score = 3;
}

message GetEmbeddingRequest {
  string text = 1;
}

message GetEmbeddingResponse {
  repeated float embedding = 1;
}

message PersonaProfile {
  string id = 1;
  string name = 2; // e.g. "Tech Interviewer"
  string role = 3; // e.g. "MAIN", "SUPPORT"
  string tone = 4; // e.g. "Sharp", "Encouraging"
}

message GenerateRequest {
  string interview_id = 1;
  string user_id = 2;
  string user_text = 3;
  // DEPRECATED: repeated ConversationHistory history = 5; (Removed for Track 2 Checkpointer)
  common.v1.InterviewStageProto stage = 6;
  optional int32 interviewer_count = 7;
  optional string domain = 8;
  
  int64 remaining_time_seconds = 10;
  int64 total_duration_seconds = 11;
  int32 current_difficulty_level = 12;
  string last_interviewer_id = 13;
  
  repeated common.v1.InterviewRoleProto available_roles = 14; 
  common.v1.InterviewPersonalityProto personality = 15;       
  string input_role = 16;                           // "user" (default) or "system"
  string persona_id = 17;                           // 면접관 페르소나 템플릿 렌더링용 식별자
}


message TokenChunk {
  string token = 1;
  bool is_final = 2;
  bool is_sentence_end = 3;
  string thinking = 4;  // LangGraph 노드 실행 정보
  
  string current_persona_id = 5;      // 발화자 ID
  int32 next_difficulty_level = 6;    // 조정된 다음 난이도
  bool reduce_total_time = 7;         // 전체 시간 20% 단축 신호
  bool interview_end_signal = 8;      // 면접 종료 신호
}

message TTSRequest {
  string text = 1;
  string mode = 2;
  string persona = 3;
  double speed = 4;
}

message TTSChunk {
  bytes audio_data = 1;
  bool is_final = 2;
}
