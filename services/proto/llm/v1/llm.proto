syntax = "proto3";

package llm.v1;

import "common/v1/enums.proto";

option java_multiple_files = true;
option java_package = "me.unbrdn.core.grpc.llm.v1";
option java_outer_classname = "LlmProto";

service LlmService {
  rpc GenerateResponse(GenerateRequest) returns (stream TokenChunk);
  rpc TextToSpeech(TTSRequest) returns (stream TTSChunk);
  // 이력서 분류 및 판별
  rpc ClassifyResume(ClassifyResumeRequest) returns (ClassifyResumeResponse);

  // 면접 리포트 생성
  rpc GenerateReport(GenerateReportRequest) returns (GenerateReportResponse);
}

message GenerateReportRequest {
  string interview_id = 1;
  repeated ReportMessage messages = 2;
}

message ReportMessage {
  string role = 1;    // USER / AI
  string content = 2;
}

message GenerateReportResponse {
  int32 total_score = 1;
  string pass_fail_status = 2;  // PASS / FAIL / HOLD
  string summary_text = 3;
  string resume_feedback = 4;
}

message ClassifyResumeRequest {
  string text = 1;
}

message ClassifyResumeResponse {
  bool is_resume = 1;
  string reason = 2;
  float score = 3;
}

message PersonaProfile {
  string id = 1;
  string name = 2; // e.g. "Tech Interviewer"
  string role = 3; // e.g. "MAIN", "SUPPORT"
  string tone = 4; // e.g. "Sharp", "Encouraging"
}

message GenerateRequest {
  string interview_id = 1;
  string user_id = 2;
  string user_text = 3;
  repeated string participating_personas = 4;
  common.v1.InterviewStageProto stage = 6;
  optional string domain = 8;
  
  int64 remaining_time_seconds = 10;
  int32 scheduled_duration_minutes = 11;
  int32 current_difficulty_level = 12;
  string last_interviewer_id = 13;
  
  string company_name = 14;
  string input_role = 16;                           // "user" (default) or "system"
  string persona_id = 17;                           // 면접관 페르소나 템플릿 렌더링용 식별자
  string resume_id = 18;                            // 이력서 IDe
  common.v1.InterviewRoundProto round = 19;         // 면접 차수/유형 (Round)
  optional string job_posting_url = 20;
  optional string self_intro_text = 21;
  optional string forced_speaker_id = 22;
}


message TokenChunk {
  string token = 1;
  bool is_final = 2;
  bool is_sentence_end = 3;
  string thinking = 4;  // LangGraph 노드 실행 정보
  
  string current_persona_id = 5;      // 발화자 ID
  int32 next_difficulty_level = 6;    // 조정된 다음 난이도
  bool reduce_total_time = 7;         // 전체 시간 20% 단축 신호
  bool interview_end_signal = 8;      // 면접 종료 신호
}

message TTSRequest {
  string text = 1;
  string mode = 2;
  string persona = 3;
  double speed = 4;
}

message TTSChunk {
  bytes audio_data = 1;
  bool is_final = 2;
}
