syntax = "proto3";

package interview.v1;

import "common/v1/enums.proto";

option java_multiple_files = true;
option java_package = "me.unbrdn.core.grpc.interview.v1";
option java_outer_classname = "InterviewProto";

// === 서비스 정의 (인터페이스) ===
service InterviewService {
  // 면접 세션 생성 요청을 받아서 응답을 반환한다.
  rpc CreateInterview (CreateInterviewRequest) returns (CreateInterviewResponse);
  
  // Stage 관리
  rpc GetInterviewStage (GetInterviewStageRequest) returns (GetInterviewStageResponse);
  rpc TransitionStage (TransitionStageRequest) returns (TransitionStageResponse);
  
  // 자기소개 리트라이 제어 (STT 우회)
  rpc RetrySelfIntro (RetrySelfIntroRequest) returns (RetrySelfIntroResponse);

  // 면접 목록 조회
  rpc ListInterviews (ListInterviewsRequest) returns (ListInterviewsResponse);
  
  // 면접 이력 조회
  rpc GetInterviewHistory (GetInterviewHistoryRequest) returns (GetInterviewHistoryResponse);
  
  // 면접 완료 (정상 종료)
  rpc CompleteInterview (CompleteInterviewRequest) returns (CompleteInterviewResponse);
  
  // 면접 취소 (비정상 종료)
  rpc CancelInterview (CancelInterviewRequest) returns (CancelInterviewResponse);
  
  // 면접 중지
  rpc PauseInterview (PauseInterviewRequest) returns (PauseInterviewResponse);
  
  // 면접 재개
  rpc ResumeInterview (ResumeInterviewRequest) returns (ResumeInterviewResponse);

  // 사용자 답변 직접 처리 (자기소개 완료/스킵 등 Socket에서 직접 트리거 시)
  rpc ProcessUserAnswer (ProcessUserAnswerRequest) returns (ProcessUserAnswerResponse);

  // 프론트에서 재생된 시스템 음성/텍스트를 대화 히스토리에 저장
  rpc SaveInterviewMessage (SaveInterviewMessageRequest) returns (SaveInterviewMessageResponse);

  // [DevTool] 면접 단계 강제 변경 (개발 환경 전용)
  rpc ForceStage (ForceStageRequest) returns (ForceStageResponse);

  // 면접 단건 조회 (상태 확인용)
  rpc GetInterview (GetInterviewRequest) returns (GetInterviewResponse);

  // 면접 리포트 생성
  rpc CreateInterviewReport (CreateInterviewReportRequest) returns (CreateInterviewReportResponse);

  // 면접 리포트 조회
  rpc GetInterviewReport (GetInterviewReportRequest) returns (GetInterviewReportResponse);

  // 면접 영상 세그먼트 업로드 URL 발급
  rpc GetRecordingSegmentUploadUrl (GetRecordingSegmentUploadUrlRequest) returns (GetRecordingSegmentUploadUrlResponse);

  // 면접 영상 세그먼트 업로드 완료 신고
  rpc CompleteRecordingSegmentUpload (CompleteRecordingSegmentUploadRequest) returns (CompleteRecordingSegmentUploadResponse);

  // 면접 영상 세그먼트 목록 조회 (다시 보기)
  rpc GetInterviewRecordingSegments (GetInterviewRecordingSegmentsRequest) returns (GetInterviewRecordingSegmentsResponse);
}

// === 메시지 정의 (DTO) ===
message CreateInterviewRequest {
  string user_id = 1; // UUID
  optional string resume_id = 2; // UUID (optional - 이력서 없이도 면접 가능)
  string company_name = 3;
  string domain = 4;
  common.v1.InterviewTypeProto type = 5;
  repeated string participating_personas = 6;
  int32 scheduled_duration_minutes = 7;
  common.v1.InterviewRoundProto round = 8;
  optional string job_posting_url = 9;
  optional string self_intro_text = 10;
}

message CreateInterviewResponse {
  string interview_id = 1; // UUID
  common.v1.InterviewStatusProto status = 2;
}

// Stage 조회
message GetInterviewStageRequest {
  string interview_id = 1;
}

message GetInterviewStageResponse {
  common.v1.InterviewStageProto stage = 1;
  int64 self_intro_elapsed_seconds = 2;
  repeated string participating_personas = 3;
  optional string domain = 5;
  int32 self_intro_retry_count = 6;
  common.v1.InterviewTurnStatusProto turn_status = 7;
  int32 turn_count = 8;
  optional string active_persona_id = 9;
  bool can_candidate_speak = 10;
}

// Stage 전환
message TransitionStageRequest {
  string interview_id = 1;
  common.v1.InterviewStageProto new_stage = 2;
}

message TransitionStageResponse {
  common.v1.InterviewStageProto current_stage = 1;
}

// 사용자 답변 직접 처리
message ProcessUserAnswerRequest {
  string interview_id = 1;
  string user_text = 2;
  string user_id = 3;
  string timestamp = 4;
}

message ProcessUserAnswerResponse {
  bool success = 1;
}

message SaveInterviewMessageRequest {
  string interview_id = 1;
  string role = 2;
  string content = 3;
  optional string stage = 4;
  optional string persona_id = 5;
  int32 turn_count = 6;
  int32 sequence_number = 7;
  optional int32 difficulty_level = 8;
}

message SaveInterviewMessageResponse {
  bool success = 1;
}

// 자기소개 리트라이 고속 제어 (STT 우회)
message RetrySelfIntroRequest {
  string interview_id = 1;
  int32 duration_seconds = 2;
}

message RetrySelfIntroResponse {
  bool success = 1;
  int32 new_retry_count = 2;
  bool is_max_retry_exceeded = 3;
}

// 면접 목록 조회
message ListInterviewsRequest {
  string user_id = 1; // UUID
  repeated common.v1.InterviewStatusProto status = 2; // 필터링할 상태 목록 (Optional)
  int32 limit = 3; // 조회 개수 제한 (Optional, 0이면 전체)
  string sort = 4; // 정렬 기준 (예: "desc", "asc" - start_at 기준)
}

message InterviewSummary {
  string interview_id = 1;
  string started_at = 2; // ISO 8601
  common.v1.InterviewStatusProto status = 3;
  string company_name = 4;
  string domain = 5;
  common.v1.InterviewTypeProto type = 6;
  int32 scheduled_duration_minutes = 7;
  optional string job_posting_url = 8;
}

message ListInterviewsResponse {
  repeated InterviewSummary interviews = 1;
}

// 면접 이력 조회
message GetInterviewHistoryRequest {
  string interview_id = 1;
}

message GetInterviewHistoryResponse {
  repeated InterviewMessage messages = 1;
}

message InterviewMessage {
  string role = 1;          // USER, ASSISTANT, SYSTEM
  string type = 2;          // TEXT, EVENT, STAGE_TRANSITION
  string content = 3;       // 메시지 내용
  string timestamp = 4;     // ISO 8601 형식
  map<string, string> payload = 5;  // 추가 메타데이터
}

// 면접 완료
message CompleteInterviewRequest {
  string interview_id = 1;
}

message CompleteInterviewResponse {
  string interview_id = 1;
  common.v1.InterviewStatusProto status = 2;
  string ended_at = 3;  // ISO 8601
}

// 면접 취소
message CancelInterviewRequest {
  string interview_id = 1;
  string reason = 2;  // 취소 사유 (선택적)
}

message CancelInterviewResponse {
  string interview_id = 1;
  common.v1.InterviewStatusProto status = 2;
  string ended_at = 3;  // ISO 8601
}

// 면접 중지
message PauseInterviewRequest {
  string interview_id = 1;
}

message PauseInterviewResponse {
  string interview_id = 1;
  common.v1.InterviewStatusProto status = 2;
  string paused_at = 3;  // ISO 8601
}

// 면접 재개
message ResumeInterviewRequest {
  string interview_id = 1;
}

message ResumeInterviewResponse {
  string interview_id = 1;
  common.v1.InterviewStatusProto status = 2;
  string resumed_at = 3;  // ISO 8601
}

// [DevTool] 면접 단계 강제 변경
message ForceStageRequest {
  string interview_id = 1;
  common.v1.InterviewStageProto target_stage = 2;
}

message ForceStageResponse {
  string interview_id = 1;
  common.v1.InterviewStageProto current_stage = 2;
  string message = 3;
}

// 면접 단건 조회
message GetInterviewRequest {
  string interview_id = 1;
}

message GetInterviewResponse {
  string interview_id = 1;
  common.v1.InterviewStatusProto status = 2;
  common.v1.InterviewStageProto current_stage = 3;
  common.v1.InterviewTypeProto type = 4;
  string company_name = 5;
  string domain = 6;
  int32 scheduled_duration_minutes = 7;
  repeated string participating_personas = 8;
  optional string created_at = 11;
  optional string resumed_at = 12;
  common.v1.InterviewRoundProto round = 13;
  optional string job_posting_url = 14;
  optional string self_intro_text = 15;
  int32 turn_count = 16;
}

// 면접 리포트 생성
message CreateInterviewReportRequest {
  string interview_id = 1;
}

message CreateInterviewReportResponse {
  string report_id = 1;
  string generation_status = 2;
}

// 면접 리포트 조회
message GetInterviewReportRequest {
  string interview_id = 1;
  string report_id = 2;
}

message GetInterviewReportResponse {
  string report_id = 1;
  string generation_status = 2;
  int32 total_score = 3;
  string pass_fail_status = 4;
  string summary_text = 5;
  string resume_feedback = 6;
}

// 면접 영상 세그먼트 업로드 URL 발급
message GetRecordingSegmentUploadUrlRequest {
  string interview_id = 1;
  int32 turn_count = 2;
}

message GetRecordingSegmentUploadUrlResponse {
  string upload_url = 1;
  string object_key = 2;
}

// 면접 영상 세그먼트 업로드 완료 신고
message CompleteRecordingSegmentUploadRequest {
  string interview_id = 1;
  string object_key = 2;
  int32 turn_count = 3;
  int32 duration_seconds = 4;
  int64 started_at_epoch = 5;
  int64 ended_at_epoch = 6;
}

message CompleteRecordingSegmentUploadResponse {
  bool success = 1;
}

// 면접 영상 세그먼트 목록 조회 (다시 보기)
message GetInterviewRecordingSegmentsRequest {
  string interview_id = 1;
}

message RecordingSegment {
  int32 turn_count = 1;
  string recording_url = 2; // 지원자 영상 URL
  int64 expires_at_epoch = 3;
  string question_content = 4; // 면접관 질문 텍스트
  string answer_content = 5;   // 지원자 답변 텍스트 (STT)
  string question_audio_url = 6; // 면접관 질문 음성 URL (TTS)
  string answer_audio_url = 7;   // 지원자 답변 음성 URL (STT 원본)
}

message GetInterviewRecordingSegmentsResponse {
  repeated RecordingSegment segments = 1;
}
