syntax = "proto3";

package interview.v1;

import "common/v1/enums.proto";

option java_multiple_files = true;
option java_package = "me.unbrdn.core.grpc.interview.v1";
option java_outer_classname = "InterviewProto";

// === 서비스 정의 (인터페이스) ===
service InterviewService {
  // 면접 세션 생성 요청을 받아서 응답을 반환한다.
  rpc CreateInterview (CreateInterviewRequest) returns (CreateInterviewResponse);
  
  // Stage 관리
  rpc GetInterviewStage (GetInterviewStageRequest) returns (GetInterviewStageResponse);
  rpc TransitionStage (TransitionStageRequest) returns (TransitionStageResponse);
  
  // 자기소개 재시도 제어
  rpc IncrementSelfIntroRetry (IncrementSelfIntroRetryRequest) returns (IncrementSelfIntroRetryResponse);

  // 면접 목록 조회
  rpc ListInterviews (ListInterviewsRequest) returns (ListInterviewsResponse);
  
  // 면접 이력 조회
  rpc GetInterviewHistory (GetInterviewHistoryRequest) returns (GetInterviewHistoryResponse);
  
  // 면접 완료 (정상 종료)
  rpc CompleteInterview (CompleteInterviewRequest) returns (CompleteInterviewResponse);
  
  // 면접 취소 (비정상 종료)
  rpc CancelInterview (CancelInterviewRequest) returns (CancelInterviewResponse);
  
  // 면접 중지
  rpc PauseInterview (PauseInterviewRequest) returns (PauseInterviewResponse);
  
  // 면접 재개
  rpc ResumeInterview (ResumeInterviewRequest) returns (ResumeInterviewResponse);

  // [DevTool] 면접 단계 강제 변경 (개발 환경 전용)
  rpc ForceStage (ForceStageRequest) returns (ForceStageResponse);

  // 면접 단건 조회 (상태 확인용)
  rpc GetInterview (GetInterviewRequest) returns (GetInterviewResponse);
}

// === 메시지 정의 (DTO) ===
message CreateInterviewRequest {
  string user_id = 1; // UUID
  optional string resume_id = 2; // UUID (optional - 이력서 없이도 면접 가능)
  string domain = 3;
  common.v1.InterviewTypeProto type = 4;
  repeated common.v1.InterviewRoleProto interviewer_roles = 9; // 복수 선택 가능 (New)
  common.v1.InterviewPersonalityProto personality = 10;        // 면접 분위기 (New)
  int32 target_duration_minutes = 7;
  string self_introduction = 8;
  int32 interviewer_count = 6; 
}

message CreateInterviewResponse {
  string interview_id = 1; // UUID
  common.v1.InterviewStatusProto status = 2;
}

// Stage 조회
message GetInterviewStageRequest {
  string interview_id = 1;
}

message GetInterviewStageResponse {
  common.v1.InterviewStageProto stage = 1;
  int64 self_intro_elapsed_seconds = 2;
  optional string persona = 3;
  optional int32 interviewer_count = 4;
  optional string domain = 5;
  int32 self_intro_retry_count = 6;
  repeated common.v1.InterviewRoleProto interviewer_roles = 7;
  common.v1.InterviewPersonalityProto personality = 8;
}

// Stage 전환
message TransitionStageRequest {
  string interview_id = 1;
  common.v1.InterviewStageProto new_stage = 2;
}

message TransitionStageResponse {
  common.v1.InterviewStageProto current_stage = 1;
}

// 자기소개 재시도 증분
message IncrementSelfIntroRetryRequest {
  string interview_id = 1;
}

message IncrementSelfIntroRetryResponse {
  int32 new_retry_count = 1;
}

// 면접 목록 조회
message ListInterviewsRequest {
  string user_id = 1; // UUID
  repeated common.v1.InterviewStatusProto status = 2; // 필터링할 상태 목록 (Optional)
  int32 limit = 3; // 조회 개수 제한 (Optional, 0이면 전체)
  string sort = 4; // 정렬 기준 (예: "desc", "asc" - start_at 기준)
}

message InterviewSummary {
  string interview_id = 1;
  string started_at = 2; // ISO 8601
  common.v1.InterviewStatusProto status = 3;
  string domain = 4;
  common.v1.InterviewTypeProto type = 5;
  int32 target_duration_minutes = 6;
  int32 interviewer_count = 7;
}

message ListInterviewsResponse {
  repeated InterviewSummary interviews = 1;
}

// 면접 이력 조회
message GetInterviewHistoryRequest {
  string interview_id = 1;
}

message GetInterviewHistoryResponse {
  repeated InterviewMessage messages = 1;
}

message InterviewMessage {
  string role = 1;          // USER, ASSISTANT, SYSTEM
  string type = 2;          // TEXT, EVENT, STAGE_TRANSITION
  string content = 3;       // 메시지 내용
  string timestamp = 4;     // ISO 8601 형식
  map<string, string> payload = 5;  // 추가 메타데이터
}

// 면접 완료
message CompleteInterviewRequest {
  string interview_id = 1;
}

message CompleteInterviewResponse {
  string interview_id = 1;
  common.v1.InterviewStatusProto status = 2;
  string ended_at = 3;  // ISO 8601
}

// 면접 취소
message CancelInterviewRequest {
  string interview_id = 1;
  string reason = 2;  // 취소 사유 (선택적)
}

message CancelInterviewResponse {
  string interview_id = 1;
  common.v1.InterviewStatusProto status = 2;
  string ended_at = 3;  // ISO 8601
}

// 면접 중지
message PauseInterviewRequest {
  string interview_id = 1;
}

message PauseInterviewResponse {
  string interview_id = 1;
  common.v1.InterviewStatusProto status = 2;
  string paused_at = 3;  // ISO 8601
}

// 면접 재개
message ResumeInterviewRequest {
  string interview_id = 1;
}

message ResumeInterviewResponse {
  string interview_id = 1;
  common.v1.InterviewStatusProto status = 2;
  string resumed_at = 3;  // ISO 8601
}

// [DevTool] 면접 단계 강제 변경
message ForceStageRequest {
  string interview_id = 1;
  common.v1.InterviewStageProto target_stage = 2;
}

message ForceStageResponse {
  string interview_id = 1;
  common.v1.InterviewStageProto current_stage = 2;
  string message = 3;
}

// 면접 단건 조회
message GetInterviewRequest {
  string interview_id = 1;
}

message GetInterviewResponse {
  string interview_id = 1;
  common.v1.InterviewStatusProto status = 2;
  common.v1.InterviewStageProto current_stage = 3;
  common.v1.InterviewTypeProto type = 4;
  string domain = 5;
  int32 target_duration_minutes = 6;
  string self_introduction = 7;
  repeated common.v1.InterviewRoleProto interviewer_roles = 8;
  common.v1.InterviewPersonalityProto personality = 9;
  int32 interviewer_count = 10;
  optional string created_at = 11;
  optional string resumed_at = 12;
}
