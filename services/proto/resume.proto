syntax = "proto3";

package resume;

option java_package = "me.unbrdn.core.grpc";
option java_outer_classname = "ResumeProto";

service ResumeService {
  // 이력서 업로드 URL 발급
  rpc GetUploadUrl (GetUploadUrlRequest) returns (GetUploadUrlResponse);

  // 이력서 업로드 완료 알림
  rpc CompleteUpload (CompleteUploadRequest) returns (CompleteUploadResponse);




  // 사용자 이력서 목록 조회
  rpc ListResumes (ListResumesRequest) returns (ListResumesResponse);

  // 이력서 상세 조회
  rpc GetResume (GetResumeRequest) returns (GetResumeResponse);

  // 이력서 삭제
  rpc DeleteResume (DeleteResumeRequest) returns (DeleteResumeResponse);

  // 이력서 임베딩 목록 조회 (병렬 호출용)
  rpc GetResumeEmbeddings (GetResumeEmbeddingsRequest) returns (GetResumeEmbeddingsResponse);

  // 이력서 내용 유효성 검사 (LLM 연동)
  rpc ValidateResume (ValidateResumeRequest) returns (ValidateResumeResponse);
}

message ValidateResumeRequest {
  string text = 1;
}

message ValidateResumeResponse {
  bool is_resume = 1;
  string reason = 2; // 판별 이유
  float score = 3;  // 매칭 점수
}

message GetResumeEmbeddingsRequest {
  string userId = 1;
}

message ResumeEmbedding {
  string resumeId = 1;
  repeated float vector = 2;
}

message GetResumeEmbeddingsResponse {
  repeated ResumeEmbedding embeddings = 1;
}

message DeleteResumeRequest {
  string resumeId = 1;
  string userId = 2;
}

message DeleteResumeResponse {
  bool success = 1;
}

message GetUploadUrlRequest {
  string userId = 1;
  string fileName = 2;
  string title = 3;
}

message GetUploadUrlResponse {
  string uploadUrl = 1;
  string resumeId = 2;
}

message CompleteUploadRequest {
  string resumeId = 1;
  string validationText = 2; // 프론트엔드에서 전처리가 완료된 검증용 텍스트
  repeated float embedding = 3; // 프론트엔드에서 생성된 검증용 임베딩 벡터
  optional string existingResumeId = 4; // 업데이트 시 대체할 기존 이력서 ID
}

message CompleteUploadResponse {
  bool success = 1;
}




message ListResumesRequest {
  string userId = 1;
}

message ListResumesResponse {
  repeated ResumeItem resumes = 1;
}

message ResumeItem {
  string id = 1;
  string title = 2;
  string status = 3;
  string createdAt = 4;
}

message GetResumeRequest {
  string resumeId = 1;
  string userId = 2;
}

message GetResumeResponse {
  ResumeDetail resume = 1;
}

message ResumeDetail {
  string id = 1;
  string title = 2;
  string content = 3;
  string status = 4;
  string createdAt = 5;
  string fileUrl = 6;
}
