syntax = "proto3";

package resume;

option java_package = "me.unbrdn.core.grpc";
option java_outer_classname = "ResumeProto";

service ResumeService {
  // 이력서 업로드 URL 발급
  rpc GetUploadUrl (GetUploadUrlRequest) returns (GetUploadUrlResponse);

  // 이력서 업로드 완료 알림
  rpc CompleteUpload (CompleteUploadRequest) returns (CompleteUploadResponse);

  // 이력서 업로드 (Legacy: 직접 파일 전송)
  rpc UploadResume (UploadResumeRequest) returns (UploadResumeResponse);

  // 이력서 업데이트 (기존 이력서 대체)
  rpc UpdateResume (UpdateResumeRequest) returns (UpdateResumeResponse);

  // 사용자 이력서 목록 조회
  rpc ListResumes (ListResumesRequest) returns (ListResumesResponse);

  // 이력서 상세 조회
  rpc GetResume (GetResumeRequest) returns (GetResumeResponse);

  // 이력서 삭제
  rpc DeleteResume (DeleteResumeRequest) returns (DeleteResumeResponse);

  // 이력서 임베딩 목록 조회 (병렬 호출용)
  rpc GetResumeEmbeddings (GetResumeEmbeddingsRequest) returns (GetResumeEmbeddingsResponse);
}

message GetResumeEmbeddingsRequest {
  string userId = 1;
}

message ResumeEmbedding {
  string resumeId = 1;
  repeated float vector = 2;
}

message GetResumeEmbeddingsResponse {
  repeated ResumeEmbedding embeddings = 1;
}

message DeleteResumeRequest {
  string resumeId = 1;
  string userId = 2;
}

message DeleteResumeResponse {
  bool success = 1;
}

message GetUploadUrlRequest {
  string userId = 1;
  string fileName = 2;
  string title = 3;
}

message GetUploadUrlResponse {
  string uploadUrl = 1;
  string resumeId = 2;
}

message CompleteUploadRequest {
  string resumeId = 1;
  string validationText = 2; // 프론트엔드에서 전처리가 완료된 검증용 텍스트
  repeated float embedding = 3; // 프론트엔드에서 생성된 검증용 임베딩 벡터
}

message CompleteUploadResponse {
  bool success = 1;
}

message UploadResumeRequest {
  string userId = 1; // UUID
  string title = 2;
  bytes fileData = 3;
  string fileName = 4;
  string contentType = 5;
  bool forceUpload = 6; // 유사도 검증 스킵 (사용자가 "새로 등록" 선택 시)
  string validationText = 7; // 프론트엔드에서 전처리가 완료된 검증용 텍스트
  repeated float embedding = 8; // 프론트엔드에서 생성된 검증용 임베딩 벡터
}

message UploadResumeResponse {
  string resumeId = 1; // UUID (성공 시)
  SimilarResumeInfo similarResume = 2; // 유사 이력서 정보 (발견 시)
}

message SimilarResumeInfo {
  string existingResumeId = 1; // 기존 이력서 ID
  double similarity = 2;        // 유사도 (0.0 ~ 1.0)
  string title = 3;             // 기존 이력서 제목
  string uploadedAt = 4;        // 업로드 날짜
}

message UpdateResumeRequest {
  string userId = 1;            // UUID
  string existingResumeId = 2;  // 업데이트할 기존 이력서 ID
  string title = 3;
  bytes fileData = 4;
  string fileName = 5;
  string contentType = 6;
  repeated float embedding = 7; // 프론트엔드에서 생성된 검증용 임베딩 벡터
}

message UpdateResumeResponse {
  string resumeId = 1; // UUID
}

message ListResumesRequest {
  string userId = 1;
}

message ListResumesResponse {
  repeated ResumeItem resumes = 1;
}

message ResumeItem {
  string id = 1;
  string title = 2;
  string status = 3;
  string createdAt = 4;
}

message GetResumeRequest {
  string resumeId = 1;
  string userId = 2;
}

message GetResumeResponse {
  ResumeDetail resume = 1;
}

message ResumeDetail {
  string id = 1;
  string title = 2;
  string content = 3;
  string status = 4;
  string createdAt = 5;
  string fileUrl = 6;
}
