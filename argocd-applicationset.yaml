# ==========================================
# 🚀 ArgoCD 자동 감지형 통합 명세표 (ApplicationSet)
# ==========================================
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: ai-interview-apps
  namespace: argocd
spec:
  # 🔍 자동 감지기 (Generators) 설정
  generators:
    # 1. 일반 마이크로서비스 (k8s/apps/[서비스명]/prod/ 폴더가 있는 경우)
    - git:
        repoURL: https://github.com/Yoonsik-Shin/ai-interview.git
        revision: main
        directories:
          - path: k8s/apps/*/prod
    # 3. 백오피스 인프라 (k8s/infra/[서비스명]/prod/ 폴더가 있는 경우)
    - git:
        repoURL: https://github.com/Yoonsik-Shin/ai-interview.git
        revision: main
        directories:
          - path: k8s/infra/*/prod
  # 🎨 감지된 폴더를 기반으로 덮어씌울 템플릿
  template:
    metadata:
      # {{path[2]}} 는 k8s/apps/[이름]/ 에서 [이름] 부분만 동적으로 추출합니다! (예: stt, llm 등)
      name: "{{path[2]}}"
    spec:
      project: default
      source:
        repoURL: https://github.com/Yoonsik-Shin/ai-interview.git
        targetRevision: main
        path: "{{path}}" # 감지된 실제 경로 주입
      destination:
        server: https://kubernetes.default.svc
        namespace: unbrdn # 배포 타겟 네임스페이스
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
