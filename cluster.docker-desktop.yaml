# yaml-language-server: $schema=https://eksctl.io/usage/schema.json
apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: my-interview-cluster
  region: ap-northeast-2

managedNodeGroups:
  - name: spot-workers
    instanceType: t3.medium
    minSize: 1
    maxSize: 3
    desiredCapacity: 2
    volumeSize: 20
    ssh:
      allow: true
    # 👇 여기가 핵심! (비용 절감)
    spot: true
