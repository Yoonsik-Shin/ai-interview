# ==========================================
# ArgoCD 인프라 ApplicationSet
# k8s/infra/[서비스명]/prod/ 패턴 감지 (redis 제외)
# ==========================================
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: ai-interview-infra-apps
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/Yoonsik-Shin/ai-interview.git
        revision: main
        directories:
          - path: k8s/infra/*/prod
  template:
    metadata:
      name: "{{path[2]}}"
    spec:
      project: infra
      source:
        repoURL: https://github.com/Yoonsik-Shin/ai-interview.git
        targetRevision: main
        path: "{{path}}"
      destination:
        server: https://kubernetes.default.svc
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
