apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
    name: kafka-cluster
    namespace: kafka
    labels:
        app: kafka
spec:
    kafka:
        version: 4.1.1
        listeners:
            - name: plain
              port: 9092
              type: internal
              tls: false
            - name: tls
              port: 9093
              type: internal
              tls: true
        config:
            offsets.topic.replication.factor: 3
            transaction.state.log.replication.factor: 3
            transaction.state.log.min.isr: 2
            default.replication.factor: 3
            min.insync.replicas: 2
            # KRaft 모드에서는 inter.broker.protocol.version과 log.message.format.version 불필요
            # (Strimzi 0.50.0+ KRaft 기본 사용)
    entityOperator:
        topicOperator: {}
        userOperator: {}
        # entityOperator.resources는 지원되지 않음 (Strimzi v1 CRD)
        # 리소스 제한이 필요한 경우 topicOperator.resources와 userOperator.resources를 각각 설정
