apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-ui
  namespace: unbrdn
  labels:
    app: kafka-ui
    environment: prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-ui
  template:
    metadata:
      labels:
        app: kafka-ui
        environment: prod
    spec:
      containers:
        - name: kafka-ui
          image: docker.io/provectuslabs/kafka-ui:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS
              valueFrom:
                configMapKeyRef:
                  name: kafka-config
                  key: bootstrap-servers
            - name: KAFKA_CLUSTERS_0_NAME
              value: prod
            - name: SERVER_SERVLET_CONTEXT_PATH
              value: "/admin"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"
      restartPolicy: Always
