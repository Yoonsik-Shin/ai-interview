apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: redis-insight-auth
  namespace: unbrdn
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault
    kind: ClusterSecretStore
  target:
    name: redis-insight-auth
  data:
    - secretKey: auth
      remoteRef:
        key: redis-insight-htpasswd
