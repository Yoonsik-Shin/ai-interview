apiVersion: apps/v1
kind: Deployment
metadata:
  name: oracle-db
  namespace: unbrdn
  labels:
    app: oracle-db
    environment: local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oracle-db
  template:
    metadata:
      labels:
        app: oracle-db
        environment: local
    spec:
      containers:
        - name: oracle-db
          # Oracle Database Free 23c (무료 버전)
          # 주의: ARM64 (M1/M2 Mac)에서는 동작하지 않을 수 있습니다 (x86_64 전용)
          # ARM64에서는 Rosetta 또는 QEMU 에뮬레이션 필요
          image: container-registry.oracle.com/database/free:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 1521
              name: oracle
              protocol: TCP
            - containerPort: 5500
              name: oemexpress
              protocol: TCP
          env:
            # Oracle Database 초기 설정
            - name: ORACLE_PWD
              valueFrom:
                secretKeyRef:
                  name: oracle-db-credentials
                  key: password
            # PDB (Pluggable Database) 이름
            - name: ORACLE_PDB
              value: "FREEPDB1"
            # 캐릭터셋
            - name: ORACLE_CHARACTERSET
              value: "AL32UTF8"
          volumeMounts:
            - name: oracle-data
              mountPath: /opt/oracle/oradata
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          # Oracle DB는 시작 시간이 오래 걸립니다 (5-10분)
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "echo 'SELECT 1 FROM DUAL;' | sqlplus -s system/$ORACLE_PWD@FREEPDB1 | grep '^1$'"
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 20
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "echo 'SELECT 1 FROM DUAL;' | sqlplus -s system/$ORACLE_PWD@FREEPDB1 | grep '^1$'"
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "echo 'SELECT 1 FROM DUAL;' | sqlplus -s system/$ORACLE_PWD@FREEPDB1 | grep '^1$'"
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: oracle-data
          # 로컬 개발 환경에서는 emptyDir 사용 (Pod 재시작 시 데이터 삭제)
          # 영구 저장이 필요하면 PersistentVolumeClaim 사용
          emptyDir: {}
      restartPolicy: Always
