apiVersion: v1
kind: Service
metadata:
  name: oracle-db
  namespace: unbrdn
  labels:
    app: oracle-db
spec:
  type: ClusterIP
  ports:
    - name: oracle
      port: 1521
      targetPort: 1521
      protocol: TCP
    - name: oemexpress
      port: 5500
      targetPort: 5500
      protocol: TCP
  selector:
    app: oracle-db
