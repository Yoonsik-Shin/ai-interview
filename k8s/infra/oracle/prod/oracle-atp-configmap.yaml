apiVersion: v1
kind: ConfigMap
metadata:
  name: oracle-atp-config
  namespace: unbrdn
data:
  # Oracle ATP JDBC 연결 URL
  # 형식: jdbc:oracle:thin:@<connection-string>
  datasource-url: "jdbc:oracle:thin:@CHANGE_ME_ATP_CONNECTION_STRING"

  # Hibernate Dialect (Oracle용)
  jpa-database-platform: "org.hibernate.dialect.OracleDialect"

  # Connection Pool 설정 (Always Free 세션 제한 30개 고려)
  hikari-maximum-pool-size: "10"
  hikari-minimum-idle: "2"
  hikari-connection-timeout: "30000"
