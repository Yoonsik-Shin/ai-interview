apiVersion: v1
kind: ConfigMap
metadata:
  name: oci-object-storage-config
  namespace: unbrdn
data:
  # Object Storage Namespace (OCI 콘솔에서 확인)
  namespace: "CHANGE_ME_OCI_NAMESPACE"

  # Bucket 이름
  bucket: "interview-archives"

  # Object Storage API Endpoint
  # 형식: https://objectstorage.<region>.oraclecloud.com
  endpoint: "https://objectstorage.ap-seoul-1.oraclecloud.com"

  # 용량 제한 (Always Free: 20GB)
  max-storage-gb: "20"
