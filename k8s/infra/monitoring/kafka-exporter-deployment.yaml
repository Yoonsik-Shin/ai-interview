apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-exporter
  namespace: unbrdn
  labels:
    app: kafka-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-exporter
  template:
    metadata:
      labels:
        app: kafka-exporter
    spec:
      containers:
        - name: kafka-exporter
          image: bitnami/kafka-exporter:1.7.0
          imagePullPolicy: IfNotPresent
          args:
            # 로컬: unbrdn 네임스페이스의 단일 브로커 서비스(kafka:9092)
            # 프로덕션(Strimzi): 필요 시 ENV로 오버라이드 (예: kafka-cluster-kafka-bootstrap.kafka:9092)
            - "--kafka.server=$(KAFKA_SERVER)"
          env:
            - name: KAFKA_SERVER
              value: "kafka:9092"
          ports:
            - name: http
              containerPort: 9308
              protocol: TCP
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"

---
apiVersion: v1
kind: Service
metadata:
  name: kafka-exporter
  namespace: unbrdn
  labels:
    app: kafka-exporter
spec:
  type: ClusterIP
  selector:
    app: kafka-exporter
  ports:
    - name: http
      port: 9308
      targetPort: 9308
      protocol: TCP

