apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      # 노드 메트릭 (CPU/메모리 등)
      - job_name: 'node-exporter'
        metrics_path: /metrics
        kubernetes_sd_configs:
          - role: endpoints
        relabel_configs:
          - source_labels: [__meta_kubernetes_endpoints_name]
            regex: node-exporter
            action: keep

      # K8s 리소스 메트릭 (Pod/Deployment 상태 등)
      - job_name: 'kube-state-metrics'
        metrics_path: /metrics
        kubernetes_sd_configs:
          - role: endpoints
        relabel_configs:
          - source_labels: [__meta_kubernetes_endpoints_name]
            regex: kube-state-metrics
            action: keep

      # 애플리케이션 헬스 상태 확인용 (up/down 관찰)
      - job_name: 'bff-health'
        metrics_path: /health
        static_configs:
          - targets: ['bff:3000']

      - job_name: 'socket-health'
        metrics_path: /health
        static_configs:
          - targets: ['socket:4000']

      - job_name: 'core-health'
        metrics_path: /actuator/health
        static_configs:
          - targets: ['core:8081']

      - job_name: 'inference-health'
        metrics_path: /health
        static_configs:
          - targets: ['inference:8000']

      # Kafka Exporter (Kafka 상태/lag 확인)
      - job_name: 'kafka-exporter'
        metrics_path: /metrics
        static_configs:
          - targets: ['kafka-exporter.kafka:9308']

      # Redis Exporter (Helm Chart가 생성한 metrics Service 자동 발견)
      - job_name: 'redis-metrics'
        metrics_path: /metrics
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - unbrdn
        relabel_configs:
          # redis-metrics Service의 endpoints만 선택
          - source_labels: [__meta_kubernetes_service_name]
            regex: redis-metrics
            action: keep
          - source_labels: [__meta_kubernetes_endpoint_port_name]
            regex: metrics
            action: keep
