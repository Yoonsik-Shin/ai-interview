apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-exporter
  namespace: unbrdn
  labels:
    app: redis-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-exporter
  template:
    metadata:
      labels:
        app: redis-exporter
    spec:
      containers:
        - name: redis-exporter
          image: oliver006/redis_exporter:v1.67.0
          imagePullPolicy: IfNotPresent
          env:
            # 로컬/프로덕션 모두 동일한 서비스 이름(redis:6379)을 사용하도록 설계됨
            - name: REDIS_ADDR
              value: "redis:6379"
          ports:
            - name: http
              containerPort: 9121
              protocol: TCP
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"

---
apiVersion: v1
kind: Service
metadata:
  name: redis-exporter
  namespace: unbrdn
  labels:
    app: redis-exporter
spec:
  type: ClusterIP
  selector:
    app: redis-exporter
  ports:
    - name: http
      port: 9121
      targetPort: 9121
      protocol: TCP

