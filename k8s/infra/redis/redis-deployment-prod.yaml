apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: unbrdn
  labels:
    app: redis
    environment: prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        environment: prod
    spec:
      containers:
        - name: redis
          image: docker.io/library/redis:alpine
          imagePullPolicy: Always
          ports:
            - containerPort: 6379
              protocol: TCP
          resources:
            requests:
              memory: "256Mi"
              cpu: "150m"
            limits:
              memory: "512Mi"
              cpu: "300m"
      restartPolicy: Always

