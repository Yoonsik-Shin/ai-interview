# 로컬 환경용 자체 서명 인증서 설정 참고
# 이 파일은 참고용이며, 실제 인증서는 scripts/generate-self-signed-cert.sh 스크립트로 생성됩니다.
#
# 사용 방법:
# 1. 스크립트 실행: ./scripts/generate-self-signed-cert.sh
# 2. 생성된 Secret 확인: kubectl get secret tls-secret -n unbrdn
# 3. Ingress에서 Secret 참조 (ingress-local.yaml에 이미 설정됨)

# 참고: 자체 서명 인증서는 브라우저에서 경고가 표시됩니다.
# 개발 환경에서만 사용하고, 프로덕션에서는 Let's Encrypt를 사용하세요.

