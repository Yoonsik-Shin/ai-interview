# Kind 멀티 노드 클러스터 설정
# 로컬 목표: 2 vCPU 8GB × 3 워커 (총 6 vCPU, 24GB). OCI Ampere A1 등가 구성.
# Kind는 노드별 CPU/메모리 지정 미지원 → Docker/호스트 리소스 사용. 실제 할당은 환경에 따름.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: unbrdn-local
nodes:
  # Control Plane (마스터 노드)
  # node-role.kubernetes.io/control-plane 는 v1.35에서 --node-labels로 불가. setup-kind-local.sh에서 kubectl label로 부여.
  - role: control-plane
    extraPortMappings:
      - containerPort: 30080
        hostPort: 80
        protocol: TCP
      - containerPort: 30443
        hostPort: 443
        protocol: TCP

  # --- Worker 3 (2 vCPU 8GB × 3) ---
  # Kafka 3대·Redis 3 Pod 분산, 노드 1대 장애 시 2/3 리소스 유지.
  - role: worker
    labels:
      node-pool: main
      node-id: "1"
      topology.kubernetes.io/zone: zone-a

  - role: worker
    labels:
      node-pool: main
      node-id: "2"
      topology.kubernetes.io/zone: zone-b

  - role: worker
    labels:
      node-pool: main
      node-id: "3"
      topology.kubernetes.io/zone: zone-c
