apiVersion: apps/v1
kind: Deployment
metadata:
  name: socket
  namespace: unbrdn
  labels:
    app: socket
    environment: prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: socket
  template:
    metadata:
      labels:
        app: socket
        environment: prod
    spec:
      imagePullSecrets:
        - name: ocir-secret
      containers:
        - name: socket
          image: ${IMAGE_REGISTRY}/unbrdn-krn-ocir-socket:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          envFrom:
            - configMapRef:
                name: socket-config
          resources:
            requests:
              memory: "512Mi"
              cpu: "150m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      restartPolicy: Always
