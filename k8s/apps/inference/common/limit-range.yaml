apiVersion: v1
kind: LimitRange
metadata:
  name: inference-limits
  namespace: inference
spec:
  limits:
    - type: Container
      default:
        cpu: "2000m"
        memory: "4Gi"
      defaultRequest:
        cpu: "500m"
        memory: "1Gi"
      max:
        cpu: "4000m"
        memory: "8Gi"
      min:
        cpu: "250m"
        memory: "512Mi"
