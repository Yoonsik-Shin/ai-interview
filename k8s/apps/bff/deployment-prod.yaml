apiVersion: apps/v1
kind: Deployment
metadata:
  name: bff
  namespace: unbrdn
  labels:
    app: bff
    environment: prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bff
  template:
    metadata:
      labels:
        app: bff
        environment: prod
    spec:
      imagePullSecrets:
        - name: ocir-secret
      containers:
        - name: bff
          image: ${IMAGE_REGISTRY}/unbrdn-krn-ocir-bff:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: PORT
              value: "3000"
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: bff-config
                  key: redis-host
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: bff-config
                  key: redis-port
            - name: KAFKA_BROKER
              valueFrom:
                configMapKeyRef:
                  name: bff-config
                  key: kafka-broker
            - name: PYTHON_WORKER_URL
              valueFrom:
                configMapKeyRef:
                  name: bff-config
                  key: python-worker-url
            - name: CORE_GRPC_HOST
              valueFrom:
                configMapKeyRef:
                  name: bff-config
                  key: core-grpc-host
            - name: CORE_GRPC_PORT
              valueFrom:
                configMapKeyRef:
                  name: bff-config
                  key: core-grpc-port
          resources:
            requests:
              memory: "256Mi"
              cpu: "150m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      restartPolicy: Always
