apiVersion: v1
kind: ConfigMap
metadata:
  name: bff-config
  namespace: unbrdn
  labels:
    app: bff
data:
  PORT: "3000"
  TEST_CLIENT_PATH: "/app/static/test-client.html"

  REDIS_HOST: "redis.unbrdn.svc.cluster.local"
  REDIS_PORT: "6379"
  # Redis Sentinel Configuration
  REDIS_SENTINEL_HOSTS: "redis-node-0.redis-headless.unbrdn.svc.cluster.local:26379,redis-node-1.redis-headless.unbrdn.svc.cluster.local:26379"
  REDIS_SENTINEL_HOST: "redis-node-0.redis-headless.unbrdn.svc.cluster.local"
  REDIS_SENTINEL_PORT: "26379"
  REDIS_SENTINEL_NAME: "mymaster"

  JWT_JWKS_URI: "http://core.unbrdn.svc.cluster.local:8081/.well-known/jwks.json"
  JWT_JWKS_CACHE_MAX_AGE_MS: "300000"
  JWT_JWKS_REQUESTS_PER_MINUTE: "10"
  JWT_JWKS_TIMEOUT_MS: "30000"

  KAFKA_BROKER: "kafka-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092"

  CORE_GRPC_HOST: "core"
  CORE_GRPC_PORT: "9090"
  LLM_GRPC_HOST: "llm"
  LLM_GRPC_PORT: "50051"
