apiVersion: apps/v1
kind: Deployment
metadata:
  name: bff
  namespace: unbrdn
  labels:
    app: bff
    environment: local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bff
  template:
    metadata:
      labels:
        app: bff
        environment: local
    spec:
      containers:
        - name: bff
          image: bff:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          env:
            - name: PORT
              value: "3000"
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
            - name: JWT_SECRET
              value: "your-secret-key-change-in-production"
            - name: KAFKA_BROKER
              value: kafka:29092
            - name: PYTHON_WORKER_URL
              value: http://inference:8000
            - name: CORE_GRPC_HOST
              value: core
            - name: CORE_GRPC_PORT
              value: "9090"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      restartPolicy: Always
