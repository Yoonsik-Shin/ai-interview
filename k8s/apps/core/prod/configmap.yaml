apiVersion: v1
kind: ConfigMap
metadata:
  name: core-config
  namespace: unbrdn
  labels:
    app: core
    environment: prod
data:
  # Server
  SERVER_PORT: "8081"
  CORE_GRPC_PORT: "9090"

  # Kafka
  kafka-bootstrap-servers: "kafka-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092"
  SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092"
  SPRING_KAFKA_CONSUMER_GROUP_ID: "core-streaming-group"
  SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET: "latest"

  # gRPC Client (LLM Service)
  LLM_GRPC_URL: "static://llm.unbrdn.svc.cluster.local:50051"

  # Redis (대화 맥락 저장)
  REDIS_HOST: "redis.unbrdn.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_DB: "2"

  # JPA
  SPRING_JPA_HIBERNATE_DDL_AUTO: "validate"
  SPRING_JPA_SHOW_SQL: "false"
  SPRING_JPA_FORMAT_SQL: "false"

  # Flyway
  SPRING_FLYWAY_ENABLED: "true"
  SPRING_FLYWAY_CHECK_LOCATION: "true"
  SPRING_FLYWAY_LOCATIONS: "classpath:db/migration/postgresql"
  SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"

  # Logging
  LOG_LEVEL: "INFO"
  LOG_LEVEL_CORE: "DEBUG"

  # Database (Oracle ATP - 프로덕션 환경)
  # 실제 연결 정보는 k8s/infra/oracle/prod/oracle-atp-configmap.yaml 참조
  # 또는 deployment에서 oracle-atp-config ConfigMap을 직접 참조
  datasource-url: "CHANGE_ME_ORACLE_ATP_CONNECTION_STRING"
  SPRING_DATASOURCE_URL: "CHANGE_ME_ORACLE_ATP_CONNECTION_STRING"
