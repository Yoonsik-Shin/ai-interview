apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm
  namespace: unbrdn
  labels:
    app: llm
    environment: prod
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: llm
  template:
    metadata:
      labels:
        app: llm
        environment: prod
    spec:
      # 고가용성(HA): LLM 워크로드를 최대한 넓게 분산 배치
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: llm
      # OpenAI API 외부 호출만 수행 - GPU 불필요, apppool에 배치
      imagePullSecrets:
        - name: acr-secret
      containers:
        - name: llm
          image: unbrdnacr.azurecr.io/llm:4761675a1ae2b2e2468106384278850963a45bcd
          imagePullPolicy: Always
          ports:
            - containerPort: 50051
              name: grpc
              protocol: TCP
          readinessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 45
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
          envFrom:
            - secretRef:
                name: llm-secrets
            - configMapRef:
                name: llm-config
          resources:
            requests:
              memory: "1Gi"
              cpu: "200m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
      restartPolicy: Always
