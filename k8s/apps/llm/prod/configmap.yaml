apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-config
  namespace: unbrdn
  labels:
    app: llm
data:
  GRPC_PORT: "50051"
  OPENAI_MODEL: "gpt-4o-mini"

  # Azure OpenAI (prod)
  AZURE_OPENAI_ENDPOINT: "https://koreacentral.api.cognitive.microsoft.com/"
  AZURE_OPENAI_DEPLOYMENT_ID: "gpt-4o-mini"

  # Track 1: Pub/Sub (LLM 토큰 스트리밍 → Socket → Frontend)
  REDIS_HOST: "redis-track1.unbrdn.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  REDIS_SENTINEL_HOSTS: "redis-track1-node-0.redis-track1-headless.unbrdn.svc.cluster.local:26379,redis-track1-node-1.redis-track1-headless.unbrdn.svc.cluster.local:26379,redis-track1-node-2.redis-track1-headless.unbrdn.svc.cluster.local:26379"
  REDIS_SENTINEL_HOST: "redis-track1-node-0.redis-track1-headless.unbrdn.svc.cluster.local"
  REDIS_SENTINEL_PORT: "26379"
  REDIS_SENTINEL_NAME: "mymaster"

  # Track 2: LangGraph Checkpoint (대화 히스토리, 에이전트 메모리)
  REDIS_TRACK2_URL: "redis://redis-track2-master.unbrdn.svc.cluster.local:6379/0"

  TTS_QUEUE: "tts:sentence:queue"

  SYSTEM_PROMPT: "너는 10년 차 IT 개발자 면접관이다. 지원자의 답변을 듣고, 내용이 빈약하거나 기술적으로 모호한 부분을 찾아 날카로운 꼬리 질문을 한 가지만 짧게(한 문장으로) 물어봐라. 존댓말을 사용해라."
