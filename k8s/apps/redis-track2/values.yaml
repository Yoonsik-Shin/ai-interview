# ===============================
# Track 2 Redis: Umbrella Chart (Dependent: bitnami/redis)
# ===============================
redis:
  image:
    registry: docker.io
    repository: bitnami/redis
    tag: "7.2.4-debian-12-r22"

  auth:
    enabled: true
    password: "SecureTrack2Password"

  replica:
    replicaCount: 1
    nodeSelector:
      role: app

  master:
    nodeSelector:
      role: app
    persistence:
      enabled: true
      size: 8Gi

  # AOF 켜기 (대화 복구 보장)
  master:
    configmap: "redis-track2-configuration"
