# ===============================
# Track 2 Redis: LLM 독점 격리 메모리 (Bitnami)
# ===============================
redis:
  global:
    redis:
      password: "SecureTrack2Password"

  replica:
    replicaCount: 1 # Standard Master-Replica standalone
    nodeSelector:
      role: app

  master:
    nodeSelector:
      role: app
    persistence:
      enabled: true # 💡 파드 다운 시 대화 상태 복구용 디스크 활성
      size: 8Gi

  # AOF 켜기 (대화 복구 보장)
  redis:
    appendonly: "yes"
    maxmemory-policy: "volatile-lru"
