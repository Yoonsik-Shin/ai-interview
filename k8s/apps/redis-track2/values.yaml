redis:
  fullnameOverride: redis-track2

  auth:
    enabled: false

  architecture: standalone

  master:
    persistence:
      enabled: true
      size: 8Gi
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "250m"
    configuration: |
      bind 0.0.0.0
      port 6379
      appendonly yes
      appendfsync everysec
      maxmemory-policy volatile-lru
    nodeSelector:
      role: app

  sentinel:
    enabled: false

  replica:
    replicaCount: 0
