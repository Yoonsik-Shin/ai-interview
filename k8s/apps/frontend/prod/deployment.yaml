apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: unbrdn
  labels:
    app: frontend
    environment: prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        environment: prod
    spec:
      initContainers:
        - name: download-frontend
          image: minio/mc:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "🔗 OCI Object Storage 연결 중..."
              mc alias set oci "$OBJECT_STORAGE_ENDPOINT" "$OBJECT_STORAGE_ACCESS_KEY" "$OBJECT_STORAGE_SECRET_KEY"
              echo "📥 프론트엔드 파일 다운로드 중 (bucket=$OBJECT_STORAGE_BUCKET)..."
              mc cp --recursive "oci/$OBJECT_STORAGE_BUCKET/" /usr/share/nginx/html/
              echo "✅ 다운로드 완료"
              ls -la /usr/share/nginx/html/
          envFrom:
            - configMapRef:
                name: frontend-config
            - secretRef:
                name: storage-secrets
          volumeMounts:
            - name: nginx-html
              mountPath: /usr/share/nginx/html
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: nginx-html
              mountPath: /usr/share/nginx/html
              readOnly: true
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
              readOnly: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: nginx-html
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: frontend-nginx-config
