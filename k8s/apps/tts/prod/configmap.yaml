apiVersion: v1
kind: ConfigMap
metadata:
  name: tts-config
  namespace: unbrdn
data:
  # Redis
  REDIS_HOST: "redis-track1.unbrdn.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  # Redis Sentinel Configuration
  REDIS_SENTINEL_HOSTS: "redis-track1-node-0.redis-track1-headless.unbrdn.svc.cluster.local:26379,redis-track1-node-1.redis-track1-headless.unbrdn.svc.cluster.local:26379,redis-track1-node-2.redis-track1-headless.unbrdn.svc.cluster.local:26379"
  REDIS_SENTINEL_HOST: "redis-track1-node-0.redis-track1-headless.unbrdn.svc.cluster.local"
  REDIS_SENTINEL_PORT: "26379"
  REDIS_SENTINEL_NAME: "mymaster"

  # TTS 설정
  EDGE_TTS_ENABLED: "true"

  # Queue / PubSub
  TTS_SENTENCE_STREAM: "interview:sentence:stream"
  TTS_PUBSUB_CHANNEL_TEMPLATE: "interview:audio:pubsub:{interviewId}"
  REDIS_HEALTH_CHECK_INTERVAL: "10"
  REDIS_SOCKET_KEEPALIVE: "true"
  REDIS_TCP_KEEPIDLE: "30"
  REDIS_TCP_KEEPINTVL: "10"
  REDIS_TCP_KEEPCNT: "3"

  # Health Check (gRPC)
  TTS_GRPC_PORT: "50053"
