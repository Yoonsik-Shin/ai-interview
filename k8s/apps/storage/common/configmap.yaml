apiVersion: v1
kind: ConfigMap
metadata:
  name: storage-config
  namespace: unbrdn
data:
  # Kafka
  KAFKA_BROKER: "kafka-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092"

  # Kafka Topics
  STORAGE_COMPLETED_TOPIC: "storage.completed"

  # Redis (Real-time Pub/Sub - Track 1)
  REDIS_HOST: "redis-track1.unbrdn.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  REDIS_SENTINEL_MASTER: "mymaster"
  REDIS_SENTINEL_NODES: "redis-track1-node-0.redis-track1-headless.unbrdn.svc.cluster.local:26379,redis-track1-node-1.redis-track1-headless.unbrdn.svc.cluster.local:26379,redis-track1-node-2.redis-track1-headless.unbrdn.svc.cluster.local:26379"

  # Redis (Session State - Track 3)
  REDIS_TRACK3_HOST: "redis-track3.unbrdn.svc.cluster.local"
  REDIS_TRACK3_PORT: "6379"
  REDIS_AUDIO_QUEUE_PREFIX: "interview:audio:queue:storage"
  # Bitnami Helm Chart: Pod 이름은 redis-node-{ordinal} 패턴 사용
  REDIS_SENTINEL_HOSTS: "redis-track1-node-0.redis-track1-headless.unbrdn.svc.cluster.local:26379,redis-track1-node-1.redis-track1-headless.unbrdn.svc.cluster.local:26379,redis-track1-node-2.redis-track1-headless.unbrdn.svc.cluster.local:26379"
  REDIS_SENTINEL_HOST: "redis-track1-node-0.redis-track1-headless.unbrdn.svc.cluster.local"
  REDIS_SENTINEL_PORT: "26379"
  REDIS_SENTINEL_NAME: "mymaster"

  # Object Storage (S3/MinIO) - 로컬 환경
  OBJECT_STORAGE_ENDPOINT: "http://minio.unbrdn.svc.cluster.local:9000"
  OBJECT_STORAGE_PUBLIC_ENDPOINT: "http://minio.localhost"
  OBJECT_STORAGE_BUCKET: "interview-archives"
  OBJECT_STORAGE_REGION: "us-east-1"

  # Worker Configuration
  QUEUE_SCAN_INTERVAL_SEC: "10"
  QUEUE_TIMEOUT_SEC: "30"

  # Health Check
  PORT: "8000"

  # Database
  MONGODB_URI: "mongodb://root:rootpassword@mongo.unbrdn.svc.cluster.local:27017/unbrdn?authSource=admin"
