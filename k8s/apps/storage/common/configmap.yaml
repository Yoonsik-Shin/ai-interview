apiVersion: v1
kind: ConfigMap
metadata:
  name: storage-config
  namespace: unbrdn
data:
  # Kafka
  KAFKA_BROKER: "kafka-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092"

  # Kafka Topics
  STORAGE_COMPLETED_TOPIC: "storage.completed"

  # Redis
  REDIS_HOST: "redis.unbrdn.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  REDIS_AUDIO_QUEUE_PREFIX: "interview:audio"
  # Bitnami Helm Chart: Pod 이름은 redis-node-{ordinal} 패턴 사용
  REDIS_SENTINEL_HOSTS: "redis-node-0.redis-headless.unbrdn.svc.cluster.local:26379,redis-node-1.redis-headless.unbrdn.svc.cluster.local:26379"
  REDIS_SENTINEL_HOST: "redis-node-0.redis-headless.unbrdn.svc.cluster.local"
  REDIS_SENTINEL_PORT: "26379"
  REDIS_SENTINEL_NAME: "mymaster"

  # Object Storage (S3/MinIO)
  OBJECT_STORAGE_ENDPOINT: "http://minio.unbrdn.svc.cluster.local:9000"
  OBJECT_STORAGE_BUCKET: "interview-archives"
  OBJECT_STORAGE_REGION: "us-east-1"

  # Worker Configuration
  QUEUE_SCAN_INTERVAL_SEC: "10"
  QUEUE_TIMEOUT_SEC: "30"

  # Health Check
  PORT: "8000"
