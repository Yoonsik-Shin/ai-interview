apiVersion: apps/v1
kind: Deployment
metadata:
    name: storage
    namespace: unbrdn
    labels:
        app: storage
        environment: prod
spec:
    replicas: 2
    revisionHistoryLimit: 5
    selector:
        matchLabels:
            app: storage
    template:
        metadata:
            labels:
                app: storage
                environment: prod
        spec:
            # 고가용성: Storage 워크로드 분산 배치
            topologySpreadConstraints:
                - maxSkew: 1
                  topologyKey: kubernetes.io/hostname
                  whenUnsatisfiable: ScheduleAnyway
                  labelSelector:
                      matchLabels:
                          app: storage
            # AI 전용 노드에 배치
            affinity:
                podAntiAffinity:
                    preferredDuringSchedulingIgnoredDuringExecution:
                        - weight: 100
                          podAffinityTerm:
                              labelSelector:
                                  matchLabels:
                                      app: storage
                              topologyKey: kubernetes.io/hostname
                nodeAffinity:
                    requiredDuringSchedulingIgnoredDuringExecution:
                        nodeSelectorTerms:
                            - matchExpressions:
                                  - key: node-pool
                                    operator: In
                                    values:
                                        - main
            imagePullSecrets:
                - name: ocir-secret
            containers:
                - name: storage
                  image: ${IMAGE_REGISTRY}/unbrdn-krn-ocir-storage:${IMAGE_TAG}
                  imagePullPolicy: Always
                  ports:
                      - containerPort: 8000
                        protocol: TCP
                        name: http
                  # 헬스 체크
                  readinessProbe:
                      httpGet:
                          path: /health/ready
                          port: 8000
                      initialDelaySeconds: 25
                      periodSeconds: 10
                      timeoutSeconds: 5
                      failureThreshold: 5
                  livenessProbe:
                      httpGet:
                          path: /health
                          port: 8000
                      initialDelaySeconds: 40
                      periodSeconds: 20
                      timeoutSeconds: 5
                      failureThreshold: 5
                  # 환경 변수: ConfigMap/Secret에서 가져오기
                  envFrom:
                      - configMapRef:
                            name: storage-config
                      - secretRef:
                            name: storage-secrets
                  resources:
                      requests:
                          cpu: "100m"
                          memory: "256Mi"
                      limits:
                          cpu: "500m"
                          memory: "512Mi"
            restartPolicy: Always
