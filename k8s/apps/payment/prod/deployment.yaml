apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment
  namespace: unbrdn
  labels:
    app: payment
    environment: prod
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: payment
  template:
    metadata:
      labels:
        app: payment
        environment: prod
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: payment
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: payment
                topologyKey: kubernetes.io/hostname

      containers:
        - name: payment
          image: unbrdnacr.azurecr.io/payment:b509fdeb867a2a7167d2275b28c89dd2fcf0b145
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
              protocol: TCP
            - containerPort: 9090
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 40
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          # ConfigMap에서 환경 변수 로드
          envFrom:
            - configMapRef:
                name: payment-config
            - secretRef:
                name: payment-jwt-keys
          # 개별 환경 변수
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            # PostgreSQL 연결 정보 (로컬 개발용)
            # 프로덕션: Oracle Autonomous Database 사용
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/postgres?currentSchema=payment&options=-c%20search_path=payment,public"
            - name: SPRING_FLYWAY_SCHEMAS
              value: "payment,public"
            - name: SPRING_FLYWAY_CREATE_SCHEMAS
              value: "true"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: password
            - name: SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT
              value: "org.hibernate.dialect.PostgreSQLDialect"
            - name: SPRING_JPA_DATABASE_PLATFORM
              value: "org.hibernate.dialect.PostgreSQLDialect"
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: "none"
            # Redis Track1 인증
            - name: SPRING_DATA_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-track1-credentials
                  key: password
            # Strimzi Kafka 클러스터 연결 정보
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "kafka-cluster-kafka-bootstrap.kafka:9092"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
              ephemeral-storage: "200Mi"
            limits:
              memory: "1Gi"
              cpu: "1000m"
              ephemeral-storage: "1Gi"
      restartPolicy: Always
