apiVersion: v1
kind: ConfigMap
metadata:
  name: resume-config
  namespace: unbrdn
data:
  # Server
  SERVER_PORT: "8081"
  CORE_GRPC_PORT: "9090"

  # Kafka
  kafka-bootstrap-servers: "kafka-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092"
  SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092"
  SPRING_KAFKA_CONSUMER_GROUP_ID: "resume-streaming-group"
  SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET: "latest"
  KAFKA_DOCUMENT_PROCESS_TOPIC: "document.process"
  KAFKA_DOCUMENT_PROCESSED_TOPIC: "document.processed"

  LLM_GRPC_HOST: "llm.unbrdn.svc.cluster.local"
  LLM_GRPC_PORT: "50051"

  # Redis (대화 맥락 저장 - Sentinel 모드)
  REDIS_HOST: "redis-track1.unbrdn.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  SPRING_DATA_REDIS_HOST: "redis-track1.unbrdn.svc.cluster.local"
  SPRING_DATA_REDIS_PORT: "6379"
  REDIS_SENTINEL_MASTER: "mymaster"
  REDIS_SENTINEL_NODES: "redis-track1-node-0.redis-track1-headless.unbrdn.svc.cluster.local:26379,redis-track1-node-1.redis-track1-headless.unbrdn.svc.cluster.local:26379,redis-track1-node-2.redis-track1-headless.unbrdn.svc.cluster.local:26379"
  SPRING_DATA_REDIS_SENTINEL_MASTER: "mymaster"
  SPRING_DATA_REDIS_SENTINEL_NODES: "redis-track1-node-0.redis-track1-headless.unbrdn.svc.cluster.local:26379,redis-track1-node-1.redis-track1-headless.unbrdn.svc.cluster.local:26379,redis-track1-node-2.redis-track1-headless.unbrdn.svc.cluster.local:26379"

  # JPA
  SPRING_JPA_HIBERNATE_DDL_AUTO: "validate"
  SPRING_JPA_SHOW_SQL: "false"
  SPRING_JPA_FORMAT_SQL: "false"
  SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: "org.hibernate.dialect.PostgreSQLDialect"
  SPRING_JPA_DATABASE_PLATFORM: "org.hibernate.dialect.PostgreSQLDialect"

  # Datasource
  SPRING_DATASOURCE_DRIVER_CLASS_NAME: "org.postgresql.Driver"

  # Flyway
  SPRING_FLYWAY_ENABLED: "true"
  SPRING_FLYWAY_CHECK_LOCATION: "true"
  SPRING_FLYWAY_LOCATIONS: "classpath:db/migration/postgresql"
  SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
  SPRING_FLYWAY_VALIDATE_ON_MIGRATE: "false"

  # Logging
  LOG_LEVEL: "INFO"
  LOG_LEVEL_CORE: "INFO"

  # Database (PostgreSQL - 프로덕션)
  datasource-url: "jdbc:postgresql://unbrdn-postgres.postgres.database.azure.com:5432/postgres"
  SPRING_DATASOURCE_URL: "jdbc:postgresql://unbrdn-postgres.postgres.database.azure.com:5432/postgres"

  # Spring AI PgVector
  SPRING_AI_VECTORSTORE_PGVECTOR_DIMENSIONS: "384"
  SPRING_AI_VECTORSTORE_PGVECTOR_DISTANCE_TYPE: "COSINE_DISTANCE"
  SPRING_AI_VECTORSTORE_PGVECTOR_INDEX_TYPE: "HNSW"
  SPRING_AI_VECTORSTORE_PGVECTOR_REMOVE_EXISTING_VECTOR_STORE_TABLE: "false"
