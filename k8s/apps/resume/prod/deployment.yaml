apiVersion: apps/v1
kind: Deployment
metadata:
  name: resume
  namespace: unbrdn
  labels:
    app: resume
    environment: prod
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: resume
  template:
    metadata:
      labels:
        app: resume
        environment: prod
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: resume
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: resume
                topologyKey: kubernetes.io/hostname

      containers:
        - name: resume
          image: unbrdnacr.azurecr.io/resume:0ca05cd2251f9f28bd7c5bdabf31fefc84a03c45
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
              protocol: TCP
            - containerPort: 9090
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 15
          # ConfigMap에서 환경 변수 로드
          envFrom:
            - configMapRef:
                name: resume-config
            - secretRef:
                name: resume-jwt-keys
          # 개별 환경 변수
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            # PostgreSQL 연결 정보 (로컬 개발용)
            # 프로덕션: Oracle Autonomous Database 사용
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/postgres?currentSchema=resume&options=-c%20search_path=resume,public"
            - name: SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA
              value: "resume"
            - name: SPRING_FLYWAY_SCHEMAS
              value: "resume,public"
            - name: SPRING_FLYWAY_CREATE_SCHEMAS
              value: "true"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: password
            - name: SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT
              value: "org.hibernate.dialect.PostgreSQLDialect"
            - name: SPRING_JPA_DATABASE_PLATFORM
              value: "org.hibernate.dialect.PostgreSQLDialect"
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: "none"
            # Strimzi Kafka 클러스터 연결 정보
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "kafka-cluster-kafka-bootstrap.kafka:9092"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
              ephemeral-storage: "200Mi"
            limits:
              memory: "1Gi"
              cpu: "1000m"
              ephemeral-storage: "1Gi"
      restartPolicy: Always
