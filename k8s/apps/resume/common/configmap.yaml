apiVersion: v1
kind: ConfigMap
metadata:
  name: resume-config
  namespace: unbrdn
data:
  # Server
  SERVER_PORT: "8081"
  CORE_GRPC_PORT: "9090"

  # Kafka
  kafka-bootstrap-servers: "kafka-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092"
  SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092"
  SPRING_KAFKA_CONSUMER_GROUP_ID: "resume-streaming-group"
  SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET: "latest"
  KAFKA_DOCUMENT_PROCESS_TOPIC: "document.process"
  KAFKA_DOCUMENT_PROCESSED_TOPIC: "document.processed"

  LLM_GRPC_HOST: "llm.unbrdn.svc.cluster.local"
  LLM_GRPC_PORT: "50051"

  # Redis (Real-time Pub/Sub - Track 1)
  REDIS_HOST: "redis-track1.unbrdn.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  REDIS_SENTINEL_MASTER: "mymaster"
  REDIS_SENTINEL_NODES: "redis-track1-node-0.redis-track1-headless.unbrdn.svc.cluster.local:26379,redis-track1-node-1.redis-track1-headless.unbrdn.svc.cluster.local:26379,redis-track1-node-2.redis-track1-headless.unbrdn.svc.cluster.local:26379"

  # Redis (Session State - Track 3)
  REDIS_TRACK3_HOST: "redis-track3.unbrdn.svc.cluster.local"
  REDIS_TRACK3_PORT: "6379"

  # JPA
  SPRING_JPA_HIBERNATE_DDL_AUTO: "validate"
  SPRING_JPA_SHOW_SQL: "false"
  SPRING_JPA_FORMAT_SQL: "false"

  # Flyway
  SPRING_FLYWAY_ENABLED: "true"
  SPRING_FLYWAY_CHECK_LOCATION: "true"
  SPRING_FLYWAY_LOCATIONS: "classpath:db/migration/postgresql"
  SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
  SPRING_FLYWAY_VALIDATE_ON_MIGRATE: "false"

  # Logging
  LOG_LEVEL: "INFO"
  LOG_LEVEL_CORE: "INFO"

  # Database (PostgreSQL - 로컬 환경)
  datasource-url: "jdbc:postgresql://postgres.unbrdn.svc.cluster.local:5432/interview_db"
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres.unbrdn.svc.cluster.local:5432/interview_db"
