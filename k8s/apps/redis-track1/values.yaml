# ===============================
# Track 1 Redis: Sentinel Mode (Bitnami)
# ===============================
redis:
  fullnameOverride: "redis"
  global:
    redis:
      password: "SecureTrack1Password" # 가승인 패스워드

  sentinel:
    enabled: true # Sentinel 활성화 (파드 3개 분산)

  master:
    nodeSelector:
      role: app
    persistence:
      enabled: false # 디스크 쓰기 차단 (초고속 인메모리 파이프라인)
    resources:
      requests:
        cpu: 200m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

  replica:
    nodeSelector:
      role: app
    persistence:
      enabled: false
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 128Mi

  # 극강 속도 확보용 디스크 차단 추가 주입
  redis:
    appendonly: "no"
    save: ""
