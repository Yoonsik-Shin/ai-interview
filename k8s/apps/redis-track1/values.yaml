# ===============================
# Track 1 Redis: Umbrella Chart (Dependent: bitnami/redis)
# ===============================
redis:
  image:
    registry: docker.io
    repository: bitnami/redis
    tag: "7.2.4-debian-12-r22"

  sentinel:
    enabled: true
    image:
      registry: docker.io
      repository: bitnami/redis-sentinel
      tag: "7.2.4-debian-12-r19"

  auth:
    enabled: true
    password: "SecureTrack1Password"

  master:
    nodeSelector:
      role: app
    persistence:
      enabled: false

  replica:
    nodeSelector:
      role: app
    persistence:
      enabled: false
