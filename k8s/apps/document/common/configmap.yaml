apiVersion: v1
kind: ConfigMap
metadata:
  name: document-config
  namespace: unbrdn
data:
  # Kafka
  SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092"
  KAFKA_GROUP_ID: "document-group-v3"
  KAFKA_DOCUMENT_PROCESS_TOPIC: "resume.uploaded"
  KAFKA_DOCUMENT_PROCESSED_TOPIC: "document.processed"

  # Redis
  REDIS_HOST: "redis-track1.unbrdn.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_DB: "2"

  # Object Storage
  STORAGE_SERVICE_URL: "http://storage.unbrdn.svc.cluster.local:8000"

  # Server
  PORT: "8100"

  # Vector DB (PostgreSQL/pgvector - 로컬 postgres-credentials와 동일)
  VECTOR_DB_URL: "postgresql://user:password@postgres.unbrdn.svc.cluster.local:5432/interview_db"

  # Logging
  LOG_LEVEL: "INFO"
