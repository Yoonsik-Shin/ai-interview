name: 🚀 Reusable Build & Push (GitOps)

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
        description: "빌드할 서비스 이름 (예: auth, interview)"
      service_path:
        required: true
        type: string
        description: "빌드할 소스 코드 디렉토리 경로"
      helm_values_path: # input name 유지 (동 호환성)
        required: true
        type: string
        description: "ArgoCD가 바라볼 deployment.yaml 혹은 values.yaml 경로"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@v4

      - name: 🔑 Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: 🔒 ACR Login
        run: |
          az acr login --name unbrdnacr

      - name: 🛠️ Docker Build
        run: |
          docker build \
            -t unbrdnacr.azurecr.io/${{ inputs.service_name }}:${{ github.sha }} \
            -t unbrdnacr.azurecr.io/${{ inputs.service_name }}:latest \
            ${{ inputs.service_path }}

      - name: 📤 Docker Push
        run: |
          docker push unbrdnacr.azurecr.io/${{ inputs.service_name }}:${{ github.sha }}
          docker push unbrdnacr.azurecr.io/${{ inputs.service_name }}:latest

      # 💡 ArgoCD GitOps를 위한 이미지 태그 백푸시 (Helm / Raw YAML 둘 다 대응)
      - name: 🌿 Update Image Tag (GitOps Sync)
        run: |
          # 1. Helm values.yaml 형태인 경우
          if [[ "${{ inputs.helm_values_path }}" == *"values.yaml" ]]; then
            sed -i 's/tag: .*/tag: "${{ github.sha }}"/g' ${{ inputs.helm_values_path }}
          # 2. 일반 deployment.yaml 형태인 경우 (이미지 풀 경로 교체)
          else
            sed -i "s|image: .*|image: unbrdnacr.azurecr.io/${{ inputs.service_name }}:${{ github.sha }}|g" ${{ inputs.helm_values_path }}
          fi

      - name: 💾 Commit and Push Deployment Trigger
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ inputs.helm_values_path }}
          git commit -m "deploy(${{ inputs.service_name }}): update image tag to ${{ github.sha }}" || echo "No changes to commit"
          git push origin main
