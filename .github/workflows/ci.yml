name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.filter.outputs.core }}
      bff: ${{ steps.filter.outputs.bff }}
      socket: ${{ steps.filter.outputs.socket }}
      llm: ${{ steps.filter.outputs.llm }}
      stt: ${{ steps.filter.outputs.stt }}
      tts: ${{ steps.filter.outputs.tts }}
      storage: ${{ steps.filter.outputs.storage }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed services
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            core:
              - 'services/core/**'
            bff:
              - 'services/bff/**'
            socket:
              - 'services/socket/**'
            llm:
              - 'services/llm/**'
            stt:
              - 'services/stt/**'
            tts:
              - 'services/tts/**'
            storage:
              - 'services/storage/**'

  lint-and-test:
    runs-on: ubuntu-latest
    needs: detect-changes
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install BFF deps
        if: needs.detect-changes.outputs.bff == 'true'
        working-directory: services/bff
        run: pnpm install --frozen-lockfile

      - name: Install Socket deps
        if: needs.detect-changes.outputs.socket == 'true'
        working-directory: services/socket
        run: pnpm install --frozen-lockfile

      - name: Core - Gradle test
        if: needs.detect-changes.outputs.core == 'true'
        working-directory: services/core
        run: ./gradlew test

      - name: BFF - lint & test
        if: needs.detect-changes.outputs.bff == 'true'
        working-directory: services/bff
        run: |
          pnpm lint || echo "lint script not defined, skip"
          pnpm test || echo "test script not defined, skip"

      - name: Socket - lint & test
        if: needs.detect-changes.outputs.socket == 'true'
        working-directory: services/socket
        run: |
          pnpm lint || echo "lint script not defined, skip"
          pnpm test || echo "test script not defined, skip"

      - name: LLM - basic check
        if: needs.detect-changes.outputs.llm == 'true'
        working-directory: services/llm
        run: |
          python -m compileall .

  build-and-push:
    runs-on: ubuntu-latest
    needs: [detect-changes, lint-and-test]
    if: github.ref == 'refs/heads/main'
    env:
      IMAGE_REGISTRY: ${{ secrets.OCI_REGISTRY }}
      REPO_STT: ${{ vars.REPO_STT || 'unbrdn-krn-ocir-stt' }}
      REPO_TTS: ${{ vars.REPO_TTS || 'unbrdn-krn-ocir-tts' }}
      REPO_STORAGE: ${{ vars.REPO_STORAGE || 'unbrdn-krn-ocir-storage' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to OCI registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.OCI_REGISTRY }}
          username: ${{ secrets.OCI_USERNAME }}
          password: ${{ secrets.OCI_PASSWORD }}

      - name: Build & push Core image
        if: needs.detect-changes.outputs.core == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./services/core
          file: ./services/core/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            BUILD_PROFILE=prod
          tags: |
            ${{ secrets.OCI_REGISTRY }}/unbrdn-krn-ocir-core:${{ github.sha }}
            ${{ secrets.OCI_REGISTRY }}/unbrdn-krn-ocir-core:latest
          # BuildKit 캐시: GitHub Actions 캐시 API 사용 (레이어 캐싱)
          cache-from: type=gha,scope=core
          cache-to: type=gha,mode=max,scope=core

      - name: Build & push BFF image
        if: needs.detect-changes.outputs.bff == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./services/bff
          file: ./services/bff/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.OCI_REGISTRY }}/unbrdn-krn-ocir-bff:${{ github.sha }}
            ${{ secrets.OCI_REGISTRY }}/unbrdn-krn-ocir-bff:latest
          # BuildKit 캐시: GitHub Actions 캐시 API 사용 (레이어 캐싱)
          cache-from: type=gha,scope=bff
          cache-to: type=gha,mode=max,scope=bff

      - name: Build & push Socket image
        if: needs.detect-changes.outputs.socket == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./services/socket
          file: ./services/socket/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.OCI_REGISTRY }}/unbrdn-krn-ocir-socket:${{ github.sha }}
            ${{ secrets.OCI_REGISTRY }}/unbrdn-krn-ocir-socket:latest
          # BuildKit 캐시: GitHub Actions 캐시 API 사용 (레이어 캐싱)
          cache-from: type=gha,scope=socket
          cache-to: type=gha,mode=max,scope=socket

      - name: Build & push LLM image
        if: needs.detect-changes.outputs.llm == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./services/llm
          file: ./services/llm/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-contexts: |
            proto=services/proto
          tags: |
            ${{ secrets.OCI_REGISTRY }}/unbrdn-krn-ocir-llm:${{ github.sha }}
            ${{ secrets.OCI_REGISTRY }}/unbrdn-krn-ocir-llm:latest
          # BuildKit 캐시: GitHub Actions 캐시 API 사용 (레이어 캐싱)
          cache-from: type=gha,scope=llm
          cache-to: type=gha,mode=max,scope=llm

      - name: Build & push STT image
        if: needs.detect-changes.outputs.stt == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./services/stt
          file: ./services/stt/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-contexts: |
            proto=services/proto
          tags: |
            ${{ env.IMAGE_REGISTRY }}/${{ env.REPO_STT }}:${{ github.sha }}
            ${{ env.IMAGE_REGISTRY }}/${{ env.REPO_STT }}:latest
          cache-from: type=gha,scope=stt
          cache-to: type=gha,mode=max,scope=stt

      - name: Build & push TTS image
        if: needs.detect-changes.outputs.tts == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./services/tts
          file: ./services/tts/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_REGISTRY }}/${{ env.REPO_TTS }}:${{ github.sha }}
            ${{ env.IMAGE_REGISTRY }}/${{ env.REPO_TTS }}:latest
          cache-from: type=gha,scope=tts
          cache-to: type=gha,mode=max,scope=tts

      - name: Build & push Storage image
        if: needs.detect-changes.outputs.storage == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./services/storage
          file: ./services/storage/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_REGISTRY }}/${{ env.REPO_STORAGE }}:${{ github.sha }}
            ${{ env.IMAGE_REGISTRY }}/${{ env.REPO_STORAGE }}:latest
          cache-from: type=gha,scope=storage
          cache-to: type=gha,mode=max,scope=storage
