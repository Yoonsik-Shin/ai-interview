name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches: [main]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.filter.outputs.core }}
      bff: ${{ steps.filter.outputs.bff }}
      socket: ${{ steps.filter.outputs.socket }}
      inference: ${{ steps.filter.outputs.inference }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Detect changed services
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            core:
              - 'services/core/**'
            bff:
              - 'services/bff/**'
            socket:
              - 'services/socket/**'
            inference:
              - 'services/inference/**'

  deploy-prod:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    env:
      IMAGE_REGISTRY: ${{ secrets.OCI_REGISTRY }}
      IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install OCI CLI
        run: |
          python -m pip install --upgrade pip
          pip install oci-cli

      - name: Configure OCI config
        env:
          OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
          SUPPRESS_LABEL_WARNING: "True"
        run: |
          mkdir -p ~/.oci
          cat > ~/.oci/config <<EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ secrets.OCI_REGION }}
          key_file=/home/runner/.oci/oci_api_key.pem
          EOF

          echo "${{ secrets.OCI_API_PRIVATE_KEY }}" > /home/runner/.oci/oci_api_key.pem
          chmod 600 /home/runner/.oci/oci_api_key.pem
          chmod 600 ~/.oci/config

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Generate kubeconfig from OCI
        env:
          OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
          SUPPRESS_LABEL_WARNING: "True"
        run: |
          mkdir -p $HOME/.kube
          # OCI CLI를 사용하여 kubeconfig 생성 (OKE_CLUSTER_OCID가 있는 경우)
          if [ -n "${{ secrets.OKE_CLUSTER_OCID }}" ]; then
            echo "🔑 OCI CLI로 kubeconfig 생성 시도..."
            oci ce cluster create-kubeconfig \
              --cluster-id ${{ secrets.OKE_CLUSTER_OCID }} \
              --file $HOME/.kube/config \
              --region ${{ secrets.OCI_REGION }} \
              --token-version 2.0.0 && {
              echo "✅ OCI CLI로 kubeconfig 생성 성공"
              chmod 600 $HOME/.kube/config
            } || {
              echo "⚠️  OCI CLI로 kubeconfig 생성 실패, secrets의 kubeconfig 사용 시도"
              echo "${{ secrets.OKE_KUBECONFIG }}" > $HOME/.kube/config
              chmod 600 $HOME/.kube/config
            }
          else
            echo "⚠️  OKE_CLUSTER_OCID가 설정되지 않음, secrets의 kubeconfig 사용"
            echo "${{ secrets.OKE_KUBECONFIG }}" > $HOME/.kube/config
            chmod 600 $HOME/.kube/config
          fi

      - name: Verify cluster connection
        env:
          OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
          SUPPRESS_LABEL_WARNING: "True"
        run: |
          # kubeconfig 파일 존재 및 내용 확인
          if [ ! -f "$HOME/.kube/config" ]; then
            echo "❌ kubeconfig 파일이 존재하지 않습니다"
            exit 1
          fi

          echo "📋 kubeconfig 파일 크기: $(wc -c < $HOME/.kube/config) bytes"
          echo "📋 kubeconfig 클러스터 정보:"
          kubectl config view --minify --raw 2>/dev/null | grep -E "(server:|cluster:)" || true

          # 클러스터 연결 테스트
          echo "🔍 클러스터 연결 테스트 중..."
          kubectl cluster-info || {
            echo "❌ 클러스터 연결 실패"
            echo "kubeconfig 내용 (처음 30줄):"
            head -30 $HOME/.kube/config
            exit 1
          }

          echo "✅ 클러스터 연결 성공"
          kubectl get nodes

      - name: Apply infra manifests (if needed)
        env:
          OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
          SUPPRESS_LABEL_WARNING: "True"
        run: |
          kubectl apply --validate=false -f k8s/infra/redis -n unbrdn || true
          kubectl apply --validate=false -f k8s/infra/kafka -n unbrdn || true
          kubectl apply --validate=false -f k8s/infra/monitoring -n unbrdn || true

      - name: Apply app manifests
        env:
          OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
          SUPPRESS_LABEL_WARNING: "True"
        run: |
          kubectl apply --validate=false -f k8s/apps/core -n unbrdn
          kubectl apply --validate=false -f k8s/apps/bff -n unbrdn
          kubectl apply --validate=false -f k8s/apps/socket -n unbrdn
          kubectl apply --validate=false -f k8s/apps/inference -n unbrdn

      - name: Update Core image
        if: needs.detect-changes.outputs.core == 'true'
        run: |
          kubectl set image deployment/core \
            core=${IMAGE_REGISTRY}/unbrdn-krn-ocir-core:${IMAGE_TAG} \
            -n unbrdn
          kubectl rollout status deployment/core -n unbrdn

      - name: Update BFF image
        if: needs.detect-changes.outputs.bff == 'true'
        run: |
          kubectl set image deployment/bff \
            bff=${IMAGE_REGISTRY}/unbrdn-krn-ocir-bff:${IMAGE_TAG} \
            -n unbrdn
          kubectl rollout status deployment/bff -n unbrdn

      - name: Update Socket image
        if: needs.detect-changes.outputs.socket == 'true'
        run: |
          kubectl set image deployment/socket \
            socket=${IMAGE_REGISTRY}/unbrdn-krn-ocir-socket:${IMAGE_TAG} \
            -n unbrdn
          kubectl rollout status deployment/socket -n unbrdn

      - name: Update Inference image
        if: needs.detect-changes.outputs.inference == 'true'
        run: |
          kubectl set image deployment/inference \
            inference=${IMAGE_REGISTRY}/unbrdn-krn-ocir-inference:${IMAGE_TAG} \
            -n unbrdn
          kubectl rollout status deployment/inference -n unbrdn
