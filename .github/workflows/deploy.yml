name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches: [main]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.filter.outputs.core }}
      bff: ${{ steps.filter.outputs.bff }}
      socket: ${{ steps.filter.outputs.socket }}
      llm: ${{ steps.filter.outputs.llm }}
      stt: ${{ steps.filter.outputs.stt }}
      tts: ${{ steps.filter.outputs.tts }}
      storage: ${{ steps.filter.outputs.storage }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Detect changed services
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            core:
              - 'services/core/**'
            bff:
              - 'services/bff/**'
            socket:
              - 'services/socket/**'
            llm:
              - 'services/llm/**'
            stt:
              - 'services/stt/**'
            tts:
              - 'services/tts/**'
            storage:
              - 'services/storage/**'

  deploy-prod:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    env:
      IMAGE_REGISTRY: ${{ secrets.OCI_REGISTRY }}
      IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
      REPO_STT: ${{ vars.REPO_STT || 'unbrdn-krn-ocir-stt' }}
      REPO_TTS: ${{ vars.REPO_TTS || 'unbrdn-krn-ocir-tts' }}
      REPO_STORAGE: ${{ vars.REPO_STORAGE || 'unbrdn-krn-ocir-storage' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install OCI CLI
        run: |
          python -m pip install --upgrade pip
          pip install oci-cli

      - name: Configure OCI config
        env:
          OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
          SUPPRESS_LABEL_WARNING: "True"
        run: |
          mkdir -p ~/.oci

          # API нӮӨ нҢҢмқј мғқм„ұ (OCI_API_KEY лқјлІЁ м¶”к°Җ)
          cat > /home/runner/.oci/oci_api_key.pem <<EOF
          ${{ secrets.OCI_API_PRIVATE_KEY }}
          OCI_API_KEY
          EOF
          chmod 600 /home/runner/.oci/oci_api_key.pem

          # OCI config нҢҢмқј мғқм„ұ
          cat > ~/.oci/config <<EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ secrets.OCI_REGION }}
          key_file=/home/runner/.oci/oci_api_key.pem
          EOF
          chmod 600 ~/.oci/config

          # OCI мқёмҰқ н…ҢмҠӨнҠё
          echo "рҹ”Қ OCI мқёмҰқ н…ҢмҠӨнҠё мӨ‘..."
          oci iam region list --output table || {
            echo "вҡ пёҸ  OCI мқёмҰқ н…ҢмҠӨнҠё мӢӨнҢЁ (кі„мҶҚ м§„н–ү)"
          }

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Generate kubeconfig from OCI
        env:
          OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
          SUPPRESS_LABEL_WARNING: "True"
        run: |
          mkdir -p $HOME/.kube
          # OCI CLIлЎң kubeconfig мғқм„ұ мӢңлҸ„
          if [ -n "${{ secrets.OKE_CLUSTER_OCID }}" ]; then
            echo "рҹ”‘ OCI CLIлЎң kubeconfig мғқм„ұ мӨ‘..."
            oci ce cluster create-kubeconfig \
              --cluster-id ${{ secrets.OKE_CLUSTER_OCID }} \
              --file $HOME/.kube/config \
              --region ${{ secrets.OCI_REGION }} \
              --token-version 2.0.0 || {
              echo "вҡ пёҸ  OCI CLI мӢӨнҢЁ, secretsмқҳ kubeconfig мӮ¬мҡ©"
              [ -z "${{ secrets.OKE_KUBECONFIG }}" ] && { echo "вқҢ OKE_KUBECONFIG secretмқҙ м„Өм •лҗҳм§Җ м•ҠмқҢ"; exit 1; }
              echo "${{ secrets.OKE_KUBECONFIG }}" > $HOME/.kube/config
            }
          elif [ -n "${{ secrets.OKE_KUBECONFIG }}" ]; then
            echo "рҹ”‘ secretsмқҳ kubeconfig мӮ¬мҡ©"
            echo "${{ secrets.OKE_KUBECONFIG }}" > $HOME/.kube/config
          else
            echo "вқҢ OKE_CLUSTER_OCID лҳҗлҠ” OKE_KUBECONFIG secretмқҙ н•„мҡ”н•©лӢҲлӢӨ"
            exit 1
          fi
          chmod 600 $HOME/.kube/config
          echo "вң… kubeconfig мғқм„ұ мҷ„лЈҢ"

      - name: Verify cluster connection
        env:
          OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
          SUPPRESS_LABEL_WARNING: "True"
        run: |
          if [ ! -f "$HOME/.kube/config" ]; then
            echo "вқҢ kubeconfig нҢҢмқјмқҙ м—ҶмҠөлӢҲлӢӨ"
            exit 1
          fi

          echo "рҹ”Қ нҒҙлҹ¬мҠӨн„° м—°кІ° нҷ•мқё мӨ‘..."
          kubectl cluster-info && kubectl get nodes || {
            echo "вқҢ нҒҙлҹ¬мҠӨн„° м—°кІ° мӢӨнҢЁ"
            exit 1
          }
          echo "вң… нҒҙлҹ¬мҠӨн„° м—°кІ° м„ұкіө"

      - name: Apply infra manifests (if needed)
        env:
          OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
          SUPPRESS_LABEL_WARNING: "True"
        run: |
          # Redis: Bitnami Helm Chart л°°нҸ¬
          helm repo add bitnami https://charts.bitnami.com/bitnami || true
          helm repo update || true
          if helm list -n unbrdn | grep -q "^redis "; then
            helm upgrade redis bitnami/redis \
              --namespace unbrdn \
              --values k8s/infra/redis/helm/prod/values.yaml \
              --wait \
              --timeout 5m || true
          else
            # Helm лҜёкҙҖлҰ¬ Redis лҰ¬мҶҢмҠӨ м •лҰ¬ (кіјкұ° YAML мһ”м—¬л¬ј)
            for r in svc/redis-headless svc/redis configmap/redis-config; do
              kind="${r%%/*}" name="${r##*/}"
              if kubectl get "$kind" "$name" -n unbrdn &>/dev/null; then
                m=$(kubectl get "$kind" "$name" -n unbrdn -o jsonpath='{.metadata.labels.app\.kubernetes\.io/managed-by}' 2>/dev/null || echo "")
                [ "$m" = "Helm" ] || { echo "кё°мЎҙ Redis м ңкұ°: $kind/$name"; kubectl delete "$kind" "$name" -n unbrdn --ignore-not-found --wait=false || true; }
              fi
            done
            if kubectl get statefulset redis -n unbrdn &>/dev/null; then
              m=$(kubectl get statefulset redis -n unbrdn -o jsonpath='{.metadata.labels.app\.kubernetes\.io/managed-by}' 2>/dev/null || echo "")
              if [ "$m" != "Helm" ]; then
                echo "кё°мЎҙ Redis StatefulSet м ңкұ°"
                kubectl delete statefulset redis -n unbrdn --cascade=orphan --ignore-not-found || true
                kubectl delete pods -n unbrdn -l app=redis --ignore-not-found --grace-period=0 --force || true
              fi
            fi
            sleep 2
            helm install redis bitnami/redis \
              --namespace unbrdn \
              --create-namespace \
              --values k8s/infra/redis/helm/prod/values.yaml \
              --wait \
              --timeout 5m || true
          fi

          # Kafka: Strimzi мӮ¬мҡ© (кі к°Җмҡ©м„ұ)
          kubectl create namespace kafka --dry-run=client -o yaml | kubectl apply -f - || true
          if ! kubectl get deployment strimzi-cluster-operator -n kafka &>/dev/null; then
            echo "рҹ“Ұ Strimzi Operator м„Өм№ҳ мӨ‘..."
            kubectl apply -f 'https://strimzi.io/install/latest?namespace=kafka' -n kafka || true
            sleep 10
          fi
          # Kafka: common(ConfigMap, Kafka CR) вҶ’ prod(NodePool л“ұ)
          kubectl apply --validate=false -f k8s/infra/kafka/common/ || true
          kubectl apply --validate=false -f k8s/infra/kafka/prod/ --namespace=kafka || true

          # Monitoring: unbrdn namespace нҢҢмқјл§Ң м Ғмҡ© (kube-system namespace нҢҢмқј м ңмҷё)
          kubectl apply --validate=false -f k8s/infra/monitoring/grafana-deployment.yaml -n unbrdn || true
          kubectl apply --validate=false -f k8s/infra/monitoring/kafka-exporter-deployment.yaml -n unbrdn || true
          kubectl apply --validate=false -f k8s/infra/monitoring/loki-deployment.yaml -n unbrdn || true
          kubectl apply --validate=false -f k8s/infra/monitoring/prometheus-configmap.yaml -n unbrdn || true
          kubectl apply --validate=false -f k8s/infra/monitoring/prometheus-deployment.yaml -n unbrdn || true
          # Promtail RBAC (Kubernetes API м ‘к·ј к¶Ңн•ң)
          kubectl apply --validate=false -f k8s/infra/monitoring/promtail-rbac.yaml || true
          kubectl apply --validate=false -f k8s/infra/monitoring/promtail-daemonset.yaml -n unbrdn || true

          # Ingress (Grafana м ‘к·ј кІҪлЎң нҸ¬н•Ё)
          kubectl apply --validate=false -f k8s/common/ingress/prod/ -n unbrdn || true

      - name: Apply app manifests
        env:
          OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
          SUPPRESS_LABEL_WARNING: "True"
        run: |
          # ConfigMap л°Ҹ Secret л°°нҸ¬ (н”„лЎңлҚ•м…ҳ нҸҙлҚ”)
          kubectl apply --validate=false -f k8s/apps/bff/prod/ -n unbrdn || true
          kubectl apply --validate=false -f k8s/apps/core/prod/ -n unbrdn || true
          kubectl apply --validate=false -f k8s/apps/llm/prod/ -n unbrdn || true
          kubectl apply --validate=false -f k8s/apps/socket/prod/ -n unbrdn || true
          [ -d "k8s/apps/stt/prod" ] && kubectl apply --validate=false -f k8s/apps/stt/prod/ -n unbrdn || true
          [ -d "k8s/apps/tts/prod" ] && kubectl apply --validate=false -f k8s/apps/tts/prod/ -n unbrdn || true
          [ -d "k8s/apps/storage/prod" ] && kubectl apply --validate=false -f k8s/apps/storage/prod/ -n unbrdn || true
          [ -d "k8s/apps/frontend/common" ] && kubectl apply --validate=false -f k8s/apps/frontend/common/ -n unbrdn || true
          [ -d "k8s/apps/frontend/prod" ] && kubectl apply --validate=false -f k8s/apps/frontend/prod/ -n unbrdn || true

          # Secret нҢҢмқј нҷ•мқё (gitignoreм—җ нҸ¬н•Ёлҗҳм–ҙ мһҲмқ„ мҲҳ мһҲмқҢ)
          if [ ! -f "k8s/apps/llm/prod/secret.yaml" ]; then
            echo "вҡ пёҸ  (мҳөм…ҳ) Triton inference secret.yaml нҢҢмқјмқҙ м—ҶмҠөлӢҲлӢӨ. мқҙ кІҪлЎңлҠ” кё°ліё л°°нҸ¬м—җ нҸ¬н•Ёлҗҳм§Җ м•Ҡмңјл©° GPU н…ҢмҠӨнҠё мӢңм—җл§Ң мӮ¬мҡ©н•©лӢҲлӢӨ."
            echo "   kubectl create secret generic llm-secrets \\"
            echo "     --from-literal=OPENAI_API_KEY='your-api-key' \\"
            echo "     --namespace=unbrdn \\"
            echo "     --dry-run=client -o yaml | kubectl apply -f -"
          fi

          # Deployment л°°нҸ¬ (нҷҳкІҪ ліҖмҲҳ м№ҳнҷҳ)
          if grep -q '\$' k8s/apps/core/prod/deployment.yaml 2>/dev/null; then
            envsubst < k8s/apps/core/prod/deployment.yaml | kubectl apply --validate=false -f - -n unbrdn
          else
            kubectl apply --validate=false -f k8s/apps/core/prod/deployment.yaml -n unbrdn
          fi

          if grep -q '\$' k8s/apps/bff/prod/deployment.yaml 2>/dev/null; then
            envsubst < k8s/apps/bff/prod/deployment.yaml | kubectl apply --validate=false -f - -n unbrdn
          else
            kubectl apply --validate=false -f k8s/apps/bff/prod/deployment.yaml -n unbrdn
          fi

          if grep -q '\$' k8s/apps/socket/prod/deployment.yaml 2>/dev/null; then
            envsubst < k8s/apps/socket/prod/deployment.yaml | kubectl apply --validate=false -f - -n unbrdn
          else
            kubectl apply --validate=false -f k8s/apps/socket/prod/deployment.yaml -n unbrdn
          fi

          if grep -q '\$' k8s/apps/llm/prod/deployment.yaml 2>/dev/null; then
            envsubst < k8s/apps/llm/prod/deployment.yaml | kubectl apply --validate=false -f - -n unbrdn
          else
            kubectl apply --validate=false -f k8s/apps/llm/prod/deployment.yaml -n unbrdn
          fi

          # Service л°°нҸ¬ (кіөнҶө нҸҙлҚ”)
          kubectl apply --validate=false -f k8s/apps/core/common/ -n unbrdn || true
          kubectl apply --validate=false -f k8s/apps/bff/common/ -n unbrdn || true
          kubectl apply --validate=false -f k8s/apps/socket/common/ -n unbrdn || true
          kubectl apply --validate=false -f k8s/apps/llm/common/ -n unbrdn || true
          kubectl apply --validate=false -f k8s/apps/stt/common/ -n unbrdn || true
          kubectl apply --validate=false -f k8s/apps/tts/common/ -n unbrdn || true
          kubectl apply --validate=false -f k8s/apps/storage/common/ -n unbrdn || true
          kubectl apply --validate=false -f k8s/apps/frontend/common/ -n unbrdn || true

      - name: Update Core image
        if: needs.detect-changes.outputs.core == 'true'
        env:
          IMAGE_REGISTRY: ${{ secrets.OCI_REGISTRY }}
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        run: |
          IMAGE_NAME="${IMAGE_REGISTRY}/unbrdn-krn-ocir-core:${IMAGE_TAG}"
          echo "рҹ”„ Core мқҙлҜём§Җ м—…лҚ°мқҙнҠё мӢңлҸ„: ${IMAGE_NAME}"
          # м»Өл°Ӣ SHA нғңк·ёлЎң мқҙлҜём§Җ м—…лҚ°мқҙнҠё
          kubectl set image deployment/core core=${IMAGE_NAME} -n unbrdn
          # лЎӨм•„мӣғ мғҒнғң нҷ•мқё (30мҙҲ нғҖмһ„м•„мӣғмңјлЎң л№ лҘҙкІҢ мӢӨнҢЁ к°җм§Җ)
          if kubectl rollout status deployment/core -n unbrdn --timeout=30s 2>&1; then
            echo "вң… лЎӨм•„мӣғ мҷ„лЈҢ: ${IMAGE_NAME}"
          else
            echo "вҡ пёҸ  лЎӨм•„мӣғ мӢӨнҢЁ лҳҗлҠ” мқҙлҜём§Җ pull мӢӨнҢЁ. latest нғңк·ёлЎң нҸҙл°ұ..."
            kubectl set image deployment/core core=${IMAGE_REGISTRY}/unbrdn-krn-ocir-core:latest -n unbrdn
            kubectl rollout status deployment/core -n unbrdn --timeout=5m
          fi

      - name: Update BFF image
        if: needs.detect-changes.outputs.bff == 'true'
        env:
          IMAGE_REGISTRY: ${{ secrets.OCI_REGISTRY }}
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        run: |
          IMAGE_NAME="${IMAGE_REGISTRY}/unbrdn-krn-ocir-bff:${IMAGE_TAG}"
          echo "рҹ”„ BFF мқҙлҜём§Җ м—…лҚ°мқҙнҠё мӢңлҸ„: ${IMAGE_NAME}"
          kubectl set image deployment/bff bff=${IMAGE_NAME} -n unbrdn
          if kubectl rollout status deployment/bff -n unbrdn --timeout=30s 2>&1; then
            echo "вң… лЎӨм•„мӣғ мҷ„лЈҢ: ${IMAGE_NAME}"
          else
            echo "вҡ пёҸ  лЎӨм•„мӣғ мӢӨнҢЁ лҳҗлҠ” мқҙлҜём§Җ pull мӢӨнҢЁ. latest нғңк·ёлЎң нҸҙл°ұ..."
            kubectl set image deployment/bff bff=${IMAGE_REGISTRY}/unbrdn-krn-ocir-bff:latest -n unbrdn
            kubectl rollout status deployment/bff -n unbrdn --timeout=5m
          fi

      - name: Update Socket image
        if: needs.detect-changes.outputs.socket == 'true'
        env:
          IMAGE_REGISTRY: ${{ secrets.OCI_REGISTRY }}
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        run: |
          IMAGE_NAME="${IMAGE_REGISTRY}/unbrdn-krn-ocir-socket:${IMAGE_TAG}"
          echo "рҹ”„ Socket мқҙлҜём§Җ м—…лҚ°мқҙнҠё мӢңлҸ„: ${IMAGE_NAME}"
          kubectl set image deployment/socket socket=${IMAGE_NAME} -n unbrdn
          if kubectl rollout status deployment/socket -n unbrdn --timeout=30s 2>&1; then
            echo "вң… лЎӨм•„мӣғ мҷ„лЈҢ: ${IMAGE_NAME}"
          else
            echo "вҡ пёҸ  лЎӨм•„мӣғ мӢӨнҢЁ лҳҗлҠ” мқҙлҜём§Җ pull мӢӨнҢЁ. latest нғңк·ёлЎң нҸҙл°ұ..."
            kubectl set image deployment/socket socket=${IMAGE_REGISTRY}/unbrdn-krn-ocir-socket:latest -n unbrdn
            kubectl rollout status deployment/socket -n unbrdn --timeout=5m
          fi

      - name: Update LLM image
        if: needs.detect-changes.outputs.llm == 'true'
        env:
          IMAGE_REGISTRY: ${{ secrets.OCI_REGISTRY }}
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        run: |
          IMAGE_NAME="${IMAGE_REGISTRY}/unbrdn-krn-ocir-llm:${IMAGE_TAG}"
          echo "рҹ”„ LLM мқҙлҜём§Җ м—…лҚ°мқҙнҠё мӢңлҸ„: ${IMAGE_NAME}"
          kubectl set image deployment/llm llm=${IMAGE_NAME} -n unbrdn
          if kubectl rollout status deployment/llm -n unbrdn --timeout=30s 2>&1; then
            echo "вң… лЎӨм•„мӣғ мҷ„лЈҢ: ${IMAGE_NAME}"
          else
            echo "вҡ пёҸ  лЎӨм•„мӣғ мӢӨнҢЁ лҳҗлҠ” мқҙлҜём§Җ pull мӢӨнҢЁ. latest нғңк·ёлЎң нҸҙл°ұ..."
            kubectl set image deployment/llm llm=${IMAGE_REGISTRY}/unbrdn-krn-ocir-llm:latest -n unbrdn
            kubectl rollout status deployment/llm -n unbrdn --timeout=5m
          fi

      - name: Update STT image
        if: needs.detect-changes.outputs.stt == 'true'
        env:
          IMAGE_REGISTRY: ${{ secrets.OCI_REGISTRY }}
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
          REPO_STT: ${{ vars.REPO_STT || 'unbrdn-krn-ocir-stt' }}
        run: |
          if ! kubectl get deployment stt -n unbrdn >/dev/null 2>&1; then
            echo "вҡ пёҸ  stt deploymentк°Җ м—ҶмҠөлӢҲлӢӨ. мқҙлҜём§Җ м—…лҚ°мқҙнҠёлҘј кұҙл„ҲлңҒлӢҲлӢӨ."
            exit 0
          fi
          IMAGE_NAME="${IMAGE_REGISTRY}/${REPO_STT}:${IMAGE_TAG}"
          echo "рҹ”„ STT мқҙлҜём§Җ м—…лҚ°мқҙнҠё мӢңлҸ„: ${IMAGE_NAME}"
          kubectl set image deployment/stt stt=${IMAGE_NAME} -n unbrdn
          if kubectl rollout status deployment/stt -n unbrdn --timeout=30s 2>&1; then
            echo "вң… лЎӨм•„мӣғ мҷ„лЈҢ: ${IMAGE_NAME}"
          else
            echo "вҡ пёҸ  лЎӨм•„мӣғ мӢӨнҢЁ лҳҗлҠ” мқҙлҜём§Җ pull мӢӨнҢЁ. latest нғңк·ёлЎң нҸҙл°ұ..."
            kubectl set image deployment/stt stt=${IMAGE_REGISTRY}/${REPO_STT}:latest -n unbrdn
            kubectl rollout status deployment/stt -n unbrdn --timeout=5m
          fi

      - name: Update TTS image
        if: needs.detect-changes.outputs.tts == 'true'
        env:
          IMAGE_REGISTRY: ${{ secrets.OCI_REGISTRY }}
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
          REPO_TTS: ${{ vars.REPO_TTS || 'unbrdn-krn-ocir-tts' }}
        run: |
          if ! kubectl get deployment tts -n unbrdn >/dev/null 2>&1; then
            echo "вҡ пёҸ  tts deploymentк°Җ м—ҶмҠөлӢҲлӢӨ. мқҙлҜём§Җ м—…лҚ°мқҙнҠёлҘј кұҙл„ҲлңҒлӢҲлӢӨ."
            exit 0
          fi
          IMAGE_NAME="${IMAGE_REGISTRY}/${REPO_TTS}:${IMAGE_TAG}"
          echo "рҹ”„ TTS мқҙлҜём§Җ м—…лҚ°мқҙнҠё мӢңлҸ„: ${IMAGE_NAME}"
          kubectl set image deployment/tts tts=${IMAGE_NAME} -n unbrdn
          if kubectl rollout status deployment/tts -n unbrdn --timeout=30s 2>&1; then
            echo "вң… лЎӨм•„мӣғ мҷ„лЈҢ: ${IMAGE_NAME}"
          else
            echo "вҡ пёҸ  лЎӨм•„мӣғ мӢӨнҢЁ лҳҗлҠ” мқҙлҜём§Җ pull мӢӨнҢЁ. latest нғңк·ёлЎң нҸҙл°ұ..."
            kubectl set image deployment/tts tts=${IMAGE_REGISTRY}/${REPO_TTS}:latest -n unbrdn
            kubectl rollout status deployment/tts -n unbrdn --timeout=5m
          fi

      - name: Update Storage image
        if: needs.detect-changes.outputs.storage == 'true'
        env:
          IMAGE_REGISTRY: ${{ secrets.OCI_REGISTRY }}
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
          REPO_STORAGE: ${{ vars.REPO_STORAGE || 'unbrdn-krn-ocir-storage' }}
        run: |
          if ! kubectl get deployment storage -n unbrdn >/dev/null 2>&1; then
            echo "вҡ пёҸ  storage deploymentк°Җ м—ҶмҠөлӢҲлӢӨ. мқҙлҜём§Җ м—…лҚ°мқҙнҠёлҘј кұҙл„ҲлңҒлӢҲлӢӨ."
            exit 0
          fi
          IMAGE_NAME="${IMAGE_REGISTRY}/${REPO_STORAGE}:${IMAGE_TAG}"
          echo "рҹ”„ Storage мқҙлҜём§Җ м—…лҚ°мқҙнҠё мӢңлҸ„: ${IMAGE_NAME}"
          kubectl set image deployment/storage storage=${IMAGE_NAME} -n unbrdn
          if kubectl rollout status deployment/storage -n unbrdn --timeout=30s 2>&1; then
            echo "вң… лЎӨм•„мӣғ мҷ„лЈҢ: ${IMAGE_NAME}"
          else
            echo "вҡ пёҸ  лЎӨм•„мӣғ мӢӨнҢЁ лҳҗлҠ” мқҙлҜём§Җ pull мӢӨнҢЁ. latest нғңк·ёлЎң нҸҙл°ұ..."
            kubectl set image deployment/storage storage=${IMAGE_REGISTRY}/${REPO_STORAGE}:latest -n unbrdn
            kubectl rollout status deployment/storage -n unbrdn --timeout=5m
          fi
