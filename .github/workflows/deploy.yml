name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches: [main]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.filter.outputs.core }}
      bff: ${{ steps.filter.outputs.bff }}
      socket: ${{ steps.filter.outputs.socket }}
      inference: ${{ steps.filter.outputs.inference }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Detect changed services
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            core:
              - 'services/core/**'
            bff:
              - 'services/bff/**'
            socket:
              - 'services/socket/**'
            inference:
              - 'services/inference/**'

  deploy-prod:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    env:
      IMAGE_REGISTRY: ${{ secrets.OCI_REGISTRY }}
      IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install OCI CLI
        run: |
          python -m pip install --upgrade pip
          pip install oci-cli

      - name: Configure OCI config
        env:
          OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
          SUPPRESS_LABEL_WARNING: "True"
        run: |
          mkdir -p ~/.oci

          # API 키 파일 생성 (OCI_API_KEY 라벨 추가)
          cat > /home/runner/.oci/oci_api_key.pem <<EOF
          ${{ secrets.OCI_API_PRIVATE_KEY }}
          OCI_API_KEY
          EOF
          chmod 600 /home/runner/.oci/oci_api_key.pem

          # OCI config 파일 생성
          cat > ~/.oci/config <<EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ secrets.OCI_REGION }}
          key_file=/home/runner/.oci/oci_api_key.pem
          EOF
          chmod 600 ~/.oci/config

          # OCI 인증 테스트
          echo "🔍 OCI 인증 테스트 중..."
          oci iam region list --output table || {
            echo "⚠️  OCI 인증 테스트 실패 (계속 진행)"
          }

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Generate kubeconfig from OCI
        env:
          OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
          SUPPRESS_LABEL_WARNING: "True"
        run: |
          mkdir -p $HOME/.kube

          # OCI CLI로 kubeconfig 생성 시도
          if [ -n "${{ secrets.OKE_CLUSTER_OCID }}" ]; then
            echo "🔑 OCI CLI로 kubeconfig 생성 중..."
            if oci ce cluster create-kubeconfig \
              --cluster-id ${{ secrets.OKE_CLUSTER_OCID }} \
              --file $HOME/.kube/config \
              --region ${{ secrets.OCI_REGION }} \
              --token-version 2.0.0 2>&1; then
              chmod 600 $HOME/.kube/config
              echo "✅ kubeconfig 생성 완료"
            else
              echo "⚠️  OCI CLI 실패, secrets의 kubeconfig 사용"
              if [ -z "${{ secrets.OKE_KUBECONFIG }}" ]; then
                echo "❌ OKE_KUBECONFIG secret이 설정되지 않음"
                exit 1
              fi
              echo "${{ secrets.OKE_KUBECONFIG }}" > $HOME/.kube/config
              chmod 600 $HOME/.kube/config
              echo "✅ kubeconfig 생성 완료"
            fi
          elif [ -n "${{ secrets.OKE_KUBECONFIG }}" ]; then
            echo "🔑 secrets의 kubeconfig 사용"
            echo "${{ secrets.OKE_KUBECONFIG }}" > $HOME/.kube/config
            chmod 600 $HOME/.kube/config
            echo "✅ kubeconfig 생성 완료"
          else
            echo "❌ OKE_CLUSTER_OCID 또는 OKE_KUBECONFIG secret이 필요합니다"
            exit 1
          fi

      - name: Verify cluster connection
        env:
          OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
          SUPPRESS_LABEL_WARNING: "True"
        run: |
          if [ ! -f "$HOME/.kube/config" ]; then
            echo "❌ kubeconfig 파일이 없습니다"
            exit 1
          fi

          echo "🔍 클러스터 연결 확인 중..."
          kubectl cluster-info && kubectl get nodes || {
            echo "❌ 클러스터 연결 실패"
            exit 1
          }
          echo "✅ 클러스터 연결 성공"

      - name: Apply infra manifests (if needed)
        env:
          OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
          SUPPRESS_LABEL_WARNING: "True"
        run: |
          kubectl apply --validate=false -f k8s/infra/redis -n unbrdn || true
          # Kafka: Strimzi 사용 (고가용성)
          # Kafka 네임스페이스 생성
          kubectl create namespace kafka --dry-run=client -o yaml | kubectl apply -f - || true
          # Strimzi Operator 설치 확인
          if ! kubectl get deployment strimzi-cluster-operator -n kafka &>/dev/null; then
            echo "📦 Strimzi Operator 설치 중..."
            kubectl apply -f 'https://strimzi.io/install/latest?namespace=kafka' -n kafka || true
            sleep 10
          fi
          # Kafka 클러스터 배포 (파일 내부에 네임스페이스가 지정되어 있으므로 -n 옵션 제거)
          kubectl apply --validate=false -f k8s/infra/kafka/kafka-configmap-prod.yaml || true
          kubectl apply --validate=false -f k8s/infra/kafka/kafka-nodepool-prod.yaml || true
          kubectl apply --validate=false -f k8s/infra/kafka/strimzi-kafka-prod.yaml || true
          # Monitoring: unbrdn namespace 파일만 적용 (kube-system namespace 파일 제외)
          kubectl apply --validate=false -f k8s/infra/monitoring/grafana-deployment.yaml -n unbrdn || true
          kubectl apply --validate=false -f k8s/infra/monitoring/kafka-exporter-deployment.yaml -n unbrdn || true
          kubectl apply --validate=false -f k8s/infra/monitoring/loki-deployment.yaml -n unbrdn || true
          kubectl apply --validate=false -f k8s/infra/monitoring/prometheus-configmap.yaml -n unbrdn || true
          kubectl apply --validate=false -f k8s/infra/monitoring/prometheus-deployment.yaml -n unbrdn || true
          kubectl apply --validate=false -f k8s/infra/monitoring/promtail-daemonset.yaml -n unbrdn || true
          kubectl apply --validate=false -f k8s/infra/monitoring/redis-exporter-deployment.yaml -n unbrdn || true

      - name: Apply app manifests
        env:
          OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
          SUPPRESS_LABEL_WARNING: "True"
        run: |
          # ConfigMap 및 Secret 배포
          kubectl apply --validate=false -f k8s/apps/bff/configmap-prod.yaml -n unbrdn || true
          kubectl apply --validate=false -f k8s/apps/core/configmap-prod.yaml -n unbrdn || true
          kubectl apply --validate=false -f k8s/apps/inference/configmap-prod.yaml -n unbrdn || true
          # Secret 파일이 존재하는 경우에만 적용 (gitignore에 포함되어 있을 수 있음)
          if [ -f "k8s/apps/inference/secret-prod.yaml" ]; then
            kubectl apply --validate=false -f k8s/apps/inference/secret-prod.yaml -n unbrdn || true
          else
            echo "⚠️  secret-prod.yaml 파일이 없습니다. Secret은 수동으로 생성해야 합니다."
            echo "   kubectl create secret generic inference-secrets \\"
            echo "     --from-literal=OPENAI_API_KEY='your-api-key' \\"
            echo "     --namespace=unbrdn \\"
            echo "     --dry-run=client -o yaml | kubectl apply -f -"
          fi
          kubectl apply --validate=false -f k8s/apps/socket/configmap-prod.yaml -n unbrdn || true
          # Deployment 배포
          envsubst < k8s/apps/core/deployment-prod.yaml | kubectl apply --validate=false -f - -n unbrdn
          envsubst < k8s/apps/bff/deployment-prod.yaml | kubectl apply --validate=false -f - -n unbrdn
          envsubst < k8s/apps/socket/deployment-prod.yaml | kubectl apply --validate=false -f - -n unbrdn
          envsubst < k8s/apps/inference/deployment-prod.yaml | kubectl apply --validate=false -f - -n unbrdn
          # Service 배포
          kubectl apply --validate=false -f k8s/apps/core/service.yaml -n unbrdn || true
          kubectl apply --validate=false -f k8s/apps/bff/service.yaml -n unbrdn || true
          kubectl apply --validate=false -f k8s/apps/socket/service.yaml -n unbrdn || true
          kubectl apply --validate=false -f k8s/apps/inference/service.yaml -n unbrdn || true

      - name: Update Core image
        if: needs.detect-changes.outputs.core == 'true'
        env:
          IMAGE_REGISTRY: ${{ secrets.OCI_REGISTRY }}
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
          OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
          SUPPRESS_LABEL_WARNING: "True"
        run: |
          IMAGE_NAME="${IMAGE_REGISTRY}/unbrdn-krn-ocir-core:${IMAGE_TAG}"
          echo "🔄 Core 이미지 업데이트 시도: ${IMAGE_NAME}"

          # 먼저 커밋 SHA 태그로 시도
          if kubectl set image deployment/core \
            core=${IMAGE_NAME} \
            -n unbrdn 2>&1 | tee /tmp/image-update.log; then
            echo "✅ 이미지 업데이트 성공: ${IMAGE_NAME}"
            if kubectl rollout status deployment/core -n unbrdn --timeout=2m; then
              echo "✅ 롤아웃 완료"
              exit 0
            fi
          fi

          # 실패 시 latest 태그로 폴백
          echo "⚠️  이미지 업데이트 실패 또는 롤아웃 실패. latest 태그로 재시도..."
          LATEST_IMAGE="${IMAGE_REGISTRY}/unbrdn-krn-ocir-core:latest"
          kubectl set image deployment/core \
            core=${LATEST_IMAGE} \
            -n unbrdn
          kubectl rollout status deployment/core -n unbrdn --timeout=5m

      - name: Update BFF image
        if: needs.detect-changes.outputs.bff == 'true'
        env:
          IMAGE_REGISTRY: ${{ secrets.OCI_REGISTRY }}
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
          OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
          SUPPRESS_LABEL_WARNING: "True"
        run: |
          IMAGE_NAME="${IMAGE_REGISTRY}/unbrdn-krn-ocir-bff:${IMAGE_TAG}"
          echo "🔄 BFF 이미지 업데이트 시도: ${IMAGE_NAME}"

          # 먼저 커밋 SHA 태그로 시도
          if kubectl set image deployment/bff \
            bff=${IMAGE_NAME} \
            -n unbrdn 2>&1 | tee /tmp/image-update.log; then
            echo "✅ 이미지 업데이트 성공: ${IMAGE_NAME}"
            if kubectl rollout status deployment/bff -n unbrdn --timeout=2m; then
              echo "✅ 롤아웃 완료"
              exit 0
            fi
          fi

          # 실패 시 latest 태그로 폴백
          echo "⚠️  이미지 업데이트 실패 또는 롤아웃 실패. latest 태그로 재시도..."
          LATEST_IMAGE="${IMAGE_REGISTRY}/unbrdn-krn-ocir-bff:latest"
          kubectl set image deployment/bff \
            bff=${LATEST_IMAGE} \
            -n unbrdn
          kubectl rollout status deployment/bff -n unbrdn --timeout=5m

      - name: Update Socket image
        if: needs.detect-changes.outputs.socket == 'true'
        env:
          IMAGE_REGISTRY: ${{ secrets.OCI_REGISTRY }}
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
          OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
          SUPPRESS_LABEL_WARNING: "True"
        run: |
          IMAGE_NAME="${IMAGE_REGISTRY}/unbrdn-krn-ocir-socket:${IMAGE_TAG}"
          echo "🔄 Socket 이미지 업데이트 시도: ${IMAGE_NAME}"

          # 먼저 커밋 SHA 태그로 시도
          if kubectl set image deployment/socket \
            socket=${IMAGE_NAME} \
            -n unbrdn 2>&1 | tee /tmp/image-update.log; then
            echo "✅ 이미지 업데이트 성공: ${IMAGE_NAME}"
            if kubectl rollout status deployment/socket -n unbrdn --timeout=2m; then
              echo "✅ 롤아웃 완료"
              exit 0
            fi
          fi

          # 실패 시 latest 태그로 폴백
          echo "⚠️  이미지 업데이트 실패 또는 롤아웃 실패. latest 태그로 재시도..."
          LATEST_IMAGE="${IMAGE_REGISTRY}/unbrdn-krn-ocir-socket:latest"
          kubectl set image deployment/socket \
            socket=${LATEST_IMAGE} \
            -n unbrdn
          kubectl rollout status deployment/socket -n unbrdn --timeout=5m

      - name: Update Inference image
        if: needs.detect-changes.outputs.inference == 'true'
        env:
          IMAGE_REGISTRY: ${{ secrets.OCI_REGISTRY }}
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
          OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
          SUPPRESS_LABEL_WARNING: "True"
        run: |
          IMAGE_NAME="${IMAGE_REGISTRY}/unbrdn-krn-ocir-inference:${IMAGE_TAG}"
          echo "🔄 Inference 이미지 업데이트 시도: ${IMAGE_NAME}"

          # 먼저 커밋 SHA 태그로 시도
          if kubectl set image deployment/inference \
            inference=${IMAGE_NAME} \
            -n unbrdn 2>&1 | tee /tmp/image-update.log; then
            echo "✅ 이미지 업데이트 성공: ${IMAGE_NAME}"
            if kubectl rollout status deployment/inference -n unbrdn --timeout=2m; then
              echo "✅ 롤아웃 완료"
              exit 0
            fi
          fi

          # 실패 시 latest 태그로 폴백
          echo "⚠️  이미지 업데이트 실패 또는 롤아웃 실패. latest 태그로 재시도..."
          LATEST_IMAGE="${IMAGE_REGISTRY}/unbrdn-krn-ocir-inference:latest"
          kubectl set image deployment/inference \
            inference=${LATEST_IMAGE} \
            -n unbrdn
          kubectl rollout status deployment/inference -n unbrdn --timeout=5m
