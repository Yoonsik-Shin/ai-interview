name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches: [main]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.filter.outputs.core }}
      bff: ${{ steps.filter.outputs.bff }}
      socket: ${{ steps.filter.outputs.socket }}
      inference: ${{ steps.filter.outputs.inference }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Detect changed services
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            core:
              - 'services/core/**'
            bff:
              - 'services/bff/**'
            socket:
              - 'services/socket/**'
            inference:
              - 'services/inference/**'

  deploy-prod:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    env:
      IMAGE_REGISTRY: ${{ secrets.OCI_REGISTRY }}
      IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install OCI CLI
        run: |
          python -m pip install --upgrade pip
          pip install oci-cli

      - name: Configure OCI config
        run: |
          mkdir -p ~/.oci
          cat > ~/.oci/config <<EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ secrets.OCI_REGION }}
          key_file=/home/runner/.oci/oci_api_key.pem
          EOF

          echo "${{ secrets.OCI_API_PRIVATE_KEY }}" > /home/runner/.oci/oci_api_key.pem
          chmod 600 /home/runner/.oci/oci_api_key.pem

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.OKE_KUBECONFIG }}" > $HOME/.kube/config

      - name: Apply infra manifests (if needed)
        run: |
          kubectl apply -f k8s/infra/redis -n unbrdn
          kubectl apply -f k8s/infra/kafka -n unbrdn
          kubectl apply -f k8s/infra/monitoring -n unbrdn

      - name: Apply app manifests
        run: |
          kubectl apply -f k8s/apps/core -n unbrdn
          kubectl apply -f k8s/apps/bff -n unbrdn
          kubectl apply -f k8s/apps/socket -n unbrdn
          kubectl apply -f k8s/apps/inference -n unbrdn

      - name: Update Core image
        if: needs.detect-changes.outputs.core == 'true'
        run: |
          kubectl set image deployment/core \
            core=${IMAGE_REGISTRY}/unbrdn-krn-ocir-core:${IMAGE_TAG} \
            -n unbrdn
          kubectl rollout status deployment/core -n unbrdn

      - name: Update BFF image
        if: needs.detect-changes.outputs.bff == 'true'
        run: |
          kubectl set image deployment/bff \
            bff=${IMAGE_REGISTRY}/unbrdn-krn-ocir-bff:${IMAGE_TAG} \
            -n unbrdn
          kubectl rollout status deployment/bff -n unbrdn

      - name: Update Socket image
        if: needs.detect-changes.outputs.socket == 'true'
        run: |
          kubectl set image deployment/socket \
            socket=${IMAGE_REGISTRY}/unbrdn-krn-ocir-socket:${IMAGE_TAG} \
            -n unbrdn
          kubectl rollout status deployment/socket -n unbrdn

      - name: Update Inference image
        if: needs.detect-changes.outputs.inference == 'true'
        run: |
          kubectl set image deployment/inference \
            inference=${IMAGE_REGISTRY}/unbrdn-krn-ocir-inference:${IMAGE_TAG} \
            -n unbrdn
          kubectl rollout status deployment/inference -n unbrdn
