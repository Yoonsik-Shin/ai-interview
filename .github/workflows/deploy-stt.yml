name: 🔐 Deploy STT Service

on:
  workflow_dispatch: # 수동 가동 지원

  push:
    branches: [ main, dev ]
    paths:
      - 'services/infra/stt/**'
      - '.github/workflows/deploy-stt.yml'

jobs:
  call-builder:
    uses: ./.github/workflows/reusable-build-push.yml
    with:
      service_name: "stt"
      service_path: "./services/infra/stt"
      helm_values_path: "./k8s/apps/stt/prod/deployment.yaml"
    secrets:
      inherit
