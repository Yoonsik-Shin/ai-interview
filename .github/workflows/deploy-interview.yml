name: 🔐 Deploy Interview Service

on:
  workflow_dispatch: # 수동 가동 지원

  push:
    branches: [ main, dev ]
    paths:
      - 'services/domains/interview/**'
      - '.github/workflows/deploy-interview.yml'

jobs:
  call-builder:
    uses: ./.github/workflows/reusable-build-push.yml
    with:
      service_name: "interview"
      service_path: "./services/domains/interview"
      helm_values_path: "./k8s/apps/interview/values.yaml"
      dockerfile_path: "./services/domains/Dockerfile"
    secrets:
      inherit
