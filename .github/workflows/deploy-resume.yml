name: 🔐 Deploy Resume Service

permissions:
  contents: write

on:
  workflow_dispatch: # 수동 가동 지원

  push:
    branches: [ main, dev ]
    paths:
      - 'services/domains/resume/**'
      - '.github/workflows/deploy-resume.yml'

jobs:
  call-builder:
    uses: ./.github/workflows/reusable-build-push.yml
    with:
      service_name: "resume"
      service_path: "./services/domains"
      helm_values_path: "./k8s/apps/resume/values.yaml"
      dockerfile_path: "./services/domains/Dockerfile"
    secrets:
      inherit
