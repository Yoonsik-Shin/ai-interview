name: 🔐 Deploy Storage Service

on:
  workflow_dispatch: # 수동 가동 지원

  push:
    branches: [ main, dev ]
    paths:
      - 'services/infra/storage/**'
      - '.github/workflows/deploy-storage.yml'

jobs:
  call-builder:
    uses: ./.github/workflows/reusable-build-push.yml
    with:
      service_name: "storage"
      service_path: "./services/infra/storage"
      helm_values_path: "./k8s/apps/storage/prod/deployment.yaml"
    secrets:
      inherit
