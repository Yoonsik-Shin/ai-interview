name: 🔐 Deploy LLM Service

permissions:
  contents: write

on:
  workflow_dispatch: # 수동 가동 지원

  push:
    branches: [ main, dev ]
    paths:
      - 'services/infra/llm/**'
      - '.github/workflows/deploy-llm.yml'

jobs:
  call-builder:
    uses: ./.github/workflows/reusable-build-push.yml
    with:
      service_name: "llm"
      service_path: "./services/infra/llm"
      helm_values_path: "./k8s/apps/llm/prod/deployment.yaml"
    secrets:
      inherit
