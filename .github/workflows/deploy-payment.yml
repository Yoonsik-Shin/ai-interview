name: 🔐 Deploy Payment Service

on:
  workflow_dispatch: # 수동 가동 지원

  push:
    branches: [ main, dev ]
    paths:
      - 'services/domains/payment/**'
      - '.github/workflows/deploy-payment.yml'

jobs:
  call-builder:
    uses: ./.github/workflows/reusable-build-push.yml
    with:
      service_name: "payment"
      service_path: "./services/domains/payment"
      helm_values_path: "./k8s/apps/payment/values.yaml"
      dockerfile_path: "./services/domains/Dockerfile"
    secrets:
      inherit
